<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Essential for mobile web apps: disables zooming to feel like a native app -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile Radar Tracker</title>
    
    <!-- Tailwind CSS for rapid styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Leaflet CSS for the map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
     integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
     crossorigin=""/>

    <style>
        /* Force the body to fill the viewport exactly, preventing scrolling */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
        }

        /* The map sits behind everything */
        #map { 
            position: absolute;
            top: 0;
            left: 0;
            height: 100vh; 
            width: 100vw; 
            z-index: 0; 
        }

        /* Hide leaflet attribution on mobile to save space */
        .leaflet-control-attribution {
            display: none !important;
        }

        /* Smooth compass rotation */
        #compassIcon {
            transition: transform 0.3s ease-out;
        }
    </style>
</head>
<body class="relative text-gray-800">

    <!-- Map Container -->
    <div id="map"></div>

    <!-- Top Navigation / Status Overlay -->
    <div class="absolute top-0 left-0 right-0 z-[1000] p-4 pointer-events-none flex justify-between items-start pt-safe-top">
        
        <!-- City and Status Card (Glassmorphism) -->
        <div class="bg-white/85 backdrop-blur-md border border-white/20 shadow-lg rounded-2xl px-5 py-3 max-w-[70%] pointer-events-auto">
            <h1 id="cityDisplay" class="font-bold text-lg text-gray-900 truncate">Detecting Location...</h1>
            <div class="flex items-center mt-1 space-x-2">
                <div id="statusDot" class="w-2.5 h-2.5 rounded-full bg-red-500"></div>
                <p id="statusDisplay" class="text-xs font-medium text-gray-600 uppercase tracking-wide">Tracking Stopped</p>
            </div>
        </div>

        <!-- Tracking Toggle Button -->
        <button id="toggleBtn" class="bg-blue-600 hover:bg-blue-700 active:scale-95 transition-all duration-200 text-white rounded-full p-4 shadow-xl pointer-events-auto flex items-center justify-center">
            <!-- Play Icon -->
            <svg id="playIcon" class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"></path></svg>
            <!-- Stop Icon (Hidden by default) -->
            <svg id="stopIcon" class="w-6 h-6 hidden" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8 7a1 1 0 00-1 1v4a1 1 0 001 1h4a1 1 0 001-1V8a1 1 0 00-1-1H8z" clip-rule="evenodd"></path></svg>
        </button>
    </div>

    <!-- Bottom Dashboard Overlay (Speed & Direction) -->
    <div class="absolute bottom-6 left-4 right-4 z-[1000] pointer-events-none pb-safe-bottom">
        <div class="bg-white/90 backdrop-blur-xl border border-white/30 shadow-2xl rounded-3xl p-5 pointer-events-auto flex justify-between items-center relative overflow-hidden">
            
            <!-- Weather Radar Label Overlay (Subtle) -->
            <div class="absolute top-0 right-0 bg-indigo-500 text-white text-[10px] font-bold px-3 py-1 rounded-bl-xl tracking-wider opacity-80">
                LIVE RADAR
            </div>

            <!-- Speed Section -->
            <div class="flex-1 flex flex-col justify-center border-r border-gray-200/60 pr-4">
                <h2 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-1">Speed</h2>
                <div class="flex items-baseline space-x-1">
                    <span id="speedDisplay" class="text-4xl md:text-5xl font-black text-gray-800 tracking-tighter">0</span>
                    <span class="text-sm font-semibold text-gray-500">km/h</span>
                </div>
            </div>

            <!-- Direction Section -->
            <div class="flex-1 flex flex-col items-center justify-center pl-4">
                <h2 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Heading</h2>
                <div class="flex flex-col items-center justify-center w-full">
                    <!-- Compass GUI -->
                    <div class="relative w-14 h-14 bg-gradient-to-br from-gray-100 to-gray-300 rounded-full shadow-inner border border-gray-300 flex items-center justify-center mb-1">
                        <!-- North Marker -->
                        <div class="absolute top-1 text-[8px] font-bold text-red-500">N</div>
                        
                        <!-- Rotating Arrow -->
                        <div id="compassIcon" class="w-full h-full flex items-center justify-center text-blue-600">
                            <svg class="w-8 h-8 drop-shadow-md" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 10l7-7m0 0l7 7m-7-7v18"></path>
                            </svg>
                        </div>
                    </div>
                    <span id="directionDisplay" class="text-lg font-bold text-gray-700">--</span>
                </div>
            </div>

        </div>
    </div>

    <!-- Leaflet JS for the map -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
     integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
     crossorigin=""></script>

    <script>
        // DOM Elements
        const statusDisplay = document.getElementById('statusDisplay');
        const statusDot = document.getElementById('statusDot');
        const cityDisplay = document.getElementById('cityDisplay');
        const speedDisplay = document.getElementById('speedDisplay');
        const directionDisplay = document.getElementById('directionDisplay');
        const compassIcon = document.getElementById('compassIcon');
        const toggleBtn = document.getElementById('toggleBtn');
        const playIcon = document.getElementById('playIcon');
        const stopIcon = document.getElementById('stopIcon');

        // App State Variables
        let watchId = null;
        let map = null;
        let marker = null;
        let circle = null;
        let isTracking = false;
        let radarLayer = null;

        // Initialize Map (Centered on US broadly initially)
        function initMap() {
            // Leaflet map setup with touch/mobile optimized settings
            map = L.map('map', {
                zoomControl: false // Disable default zoom buttons for cleaner mobile UI
            }).setView([39.8283, -98.5795], 4);

            // Add clean OpenStreetMap tiles
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                maxZoom: 19,
                attribution: '&copy; <a href="https://carto.com/">carto.com</a>'
            }).addTo(map);

            // Fetch and add the live weather radar layer
            fetchWeatherRadar();
        }

        // Fetch Live Global Weather Radar using free RainViewer API
        async function fetchWeatherRadar() {
            try {
                // Get the latest map timestamps from RainViewer
                const response = await fetch('https://api.rainviewer.com/public/weather-maps.json');
                const data = await response.json();
                
                // Get the path for the most recent radar data
                const pastRadar = data.radar.past;
                const latestRadarPath = pastRadar[pastRadar.length - 1].path;
                
                // Configuration: 256px tiles, color scheme 2, smooth 1, snow layer 1
                const tileUrl = `https://tilecache.rainviewer.com${latestRadarPath}/256/{z}/{x}/{y}/2/1_1.png`;

                // Add to Leaflet map as an overlay
                radarLayer = L.tileLayer(tileUrl, {
                    opacity: 0.65, // Semi-transparent to see roads underneath
                    zIndex: 10,
                    attribution: 'RainViewer',
                    maxNativeZoom: 13, // Pro Tip: Forces Leaflet to scale zoom 13 tiles for deeper zoom levels
                    maxZoom: 19        // Matches the map's max street-level zoom
                }).addTo(map);

            } catch (error) {
                console.error("Failed to load weather radar:", error);
            }
        }

        // Function called every time location updates
        function handlePosition(position) {
            const { latitude, longitude, accuracy, speed, heading } = position.coords;

            // Update UI Status
            statusDisplay.textContent = "Live Tracking";
            statusDot.classList.replace('bg-yellow-500', 'bg-green-500');
            statusDot.classList.replace('bg-red-500', 'bg-green-500');

            // Update Speed (convert m/s to km/h)
            // Note: Speed is null if device lacks GPS hardware or isn't moving
            if (speed !== null && speed > 0) {
                const speedKmh = (speed * 3.6).toFixed(0);
                speedDisplay.textContent = speedKmh;
            } else {
                speedDisplay.textContent = "0";
            }

            // Update Direction (Heading)
            // Note: Heading is null if stationary
            if (heading !== null && !isNaN(heading)) {
                const directions = ['N', 'NE', 'E', 'SE', 'S', 'SW', 'W', 'NW'];
                const index = Math.round(((heading %= 360) < 0 ? heading + 360 : heading) / 45) % 8;
                
                directionDisplay.textContent = `${directions[index]}`;
                
                // Rotate compass icon (Arrow starts pointing up, which is 0 deg / North)
                compassIcon.style.transform = `rotate(${heading}deg)`;
            } else {
                directionDisplay.textContent = "--";
            }

            // Update Map Graphics
            const latLng = [latitude, longitude];
            
            if (!marker) {
                // First location fix: create marker, circle, and fetch city
                map.setView(latLng, 14);
                
                // Custom mobile-friendly marker
                const customIcon = L.divIcon({
                    className: 'bg-transparent',
                    html: `<div class="w-5 h-5 bg-blue-600 border-4 border-white rounded-full shadow-md"></div>`,
                    iconSize: [20, 20],
                    iconAnchor: [10, 10]
                });

                marker = L.marker(latLng, {icon: customIcon}).addTo(map);
                circle = L.circle(latLng, { 
                    radius: accuracy,
                    color: '#3b82f6',
                    fillColor: '#3b82f6',
                    fillOpacity: 0.15,
                    weight: 1
                }).addTo(map);
                
                fetchCityName(latitude, longitude);
            } else {
                // Subsequent updates: move graphics and pan map
                marker.setLatLng(latLng);
                circle.setLatLng(latLng);
                circle.setRadius(accuracy);
                map.panTo(latLng); // Keep user centered
            }
        }

        // Function to get City Name via Reverse Geocoding
        async function fetchCityName(lat, lng) {
            try {
                // OpenStreetMap Nominatim API
                const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lng}`);
                const data = await response.json();
                
                if (data.address) {
                    const city = data.address.city || data.address.town || data.address.village || data.address.county || data.address.state || "Unknown Area";
                    cityDisplay.textContent = city;
                }
            } catch (error) {
                console.error("City fetch error:", error);
                cityDisplay.textContent = "Location Found";
            }
        }

        // Handle geolocation errors gracefully
        function handleError(error) {
            console.warn(`Geolocation Error (${error.code}): ${error.message}`);
            
            statusDot.classList.replace('bg-green-500', 'bg-red-500');
            statusDot.classList.replace('bg-yellow-500', 'bg-red-500');

            switch(error.code) {
                case error.PERMISSION_DENIED:
                    cityDisplay.textContent = "Permission Denied";
                    statusDisplay.textContent = "Enable Location Services";
                    break;
                case error.POSITION_UNAVAILABLE:
                    statusDisplay.textContent = "Signal Lost";
                    break;
                case error.TIMEOUT:
                    statusDisplay.textContent = "Request Timed Out";
                    break;
            }
            toggleTracking(true); // Force stop tracking UI state
        }

        // Master Toggle for Tracking
        function toggleTracking(forceStop = false) {
            if (isTracking || forceStop) {
                // Stop Tracking
                if (watchId !== null) {
                    navigator.geolocation.clearWatch(watchId);
                    watchId = null;
                }
                isTracking = false;
                
                // UI Updates
                statusDisplay.textContent = "Tracking Stopped";
                statusDot.classList.replace('bg-green-500', 'bg-red-500');
                statusDot.classList.replace('bg-yellow-500', 'bg-red-500');
                
                playIcon.classList.remove('hidden');
                stopIcon.classList.add('hidden');
                toggleBtn.classList.replace('bg-red-500', 'bg-blue-600');
                toggleBtn.classList.replace('hover:bg-red-600', 'hover:bg-blue-700');

                // Reset data displays
                speedDisplay.textContent = "0";
                directionDisplay.textContent = "--";
                compassIcon.style.transform = `rotate(0deg)`;

            } else {
                // Start Tracking
                if (!navigator.geolocation) {
                    alert("Geolocation is not supported by your browser");
                    return;
                }

                isTracking = true;
                
                // UI Updates
                cityDisplay.textContent = "Connecting to GPS...";
                statusDisplay.textContent = "Locating...";
                statusDot.classList.replace('bg-red-500', 'bg-yellow-500');
                
                playIcon.classList.add('hidden');
                stopIcon.classList.remove('hidden');
                toggleBtn.classList.replace('bg-blue-600', 'bg-red-500');
                toggleBtn.classList.replace('hover:bg-blue-700', 'hover:bg-red-600');

                // Request location stream
                watchId = navigator.geolocation.watchPosition(
                    handlePosition, 
                    handleError, 
                    {
                        enableHighAccuracy: true, // Forces GPS usage for speed/heading
                        timeout: 15000, 
                        maximumAge: 0 
                    }
                );
            }
        }

        // Initialize App
        window.onload = () => {
            initMap();
            toggleBtn.addEventListener('click', () => toggleTracking());
            
            // To ensure UI feels instantly responsive, simulate initial map size validation
            setTimeout(() => { map.invalidateSize(); }, 200);
        };

    </script>
</body>
</html>

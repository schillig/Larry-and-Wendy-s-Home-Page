<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="LiteRadar - GPU Advection NOAA MRMS Radar" />
  <title>LiteRadar — Real-Time NOAA MRMS GPU Advection</title>

  <!-- MapLibre GL JS Stylesheet (v3.6.2 for broader WebGL 1.0 legacy hardware support) -->
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" />

  <style>
    /* CSS Custom Properties for Semantic Theming (W3C Standard) */
    :root {
      --bg-dark: #0f172a;
      --panel-bg: rgba(15, 23, 42, 0.85);
      --panel-border: rgba(255, 255, 255, 0.12);
      --accent-blue: #38bdf8;
      --accent-green: #22c55e;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --radius-lg: 12px;
      --radius-md: 8px;
      --font-stack: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body, html {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: var(--bg-dark);
      font-family: var(--font-stack);
      color: var(--text-main);
      -webkit-font-smoothing: antialiased;
    }

    /* Fullscreen Map Canvas */
    #map {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      background-color: var(--bg-dark);
    }

    /* Diagnostic Overlay for GitHub Pages / Live Debugging */
    #diagnostics {
      position: absolute;
      top: 80px;
      left: 16px;
      width: 350px;
      max-height: 400px;
      overflow-y: auto;
      background: rgba(0, 0, 0, 0.9);
      color: #32cd32;
      font-family: monospace;
      font-size: 0.75rem;
      padding: 12px;
      border: 1px solid #ef4444;
      border-radius: var(--radius-md);
      z-index: 9999;
      pointer-events: none;
    }

    .glass-panel {
      background: var(--panel-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px); 
      border: 1px solid var(--panel-border);
      border-radius: var(--radius-lg);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      z-index: 10;
    }

    /* Semantic Layout */
    header {
      position: absolute;
      top: 16px;
      left: 16px;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .brand h1 {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      display: inline-block;
    }

    .badge-live {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(34, 197, 94, 0.15);
      color: var(--accent-green);
      border: 1px solid rgba(34, 197, 94, 0.3);
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .telemetry {
      display: flex;
      gap: 12px;
      font-size: 0.8rem;
      color: var(--text-muted);
      border-left: 1px solid var(--panel-border);
      padding-left: 16px;
    }

    .telemetry-item span { color: var(--text-main); font-weight: 600; }

    .legend-container {
      position: absolute;
      top: 16px;
      right: 16px;
      padding: 12px 16px;
      width: 240px;
    }

    .legend-title {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .legend-bar {
      height: 10px;
      border-radius: 5px;
      background: linear-gradient(to right, rgba(0, 236, 236, 0.8), rgba(1, 160, 246, 0.8), rgba(0, 0, 246, 0.8), rgba(0, 255, 0, 0.8), rgba(0, 200, 0, 0.8), rgba(0, 140, 0, 0.8), rgba(255, 255, 0, 0.8), rgba(231, 192, 0, 0.8), rgba(255, 120, 0, 0.8), rgba(255, 0, 0, 0.8), rgba(200, 0, 0, 0.8), rgba(255, 0, 255, 0.8));
    }

    .legend-labels {
      display: flex;
      justify-content: space-between;
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .controls-container {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      width: calc(100% - 32px);
      max-width: 860px;
      padding: 16px 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .controls-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .playback-group {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .btn {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid var(--panel-border);
      color: var(--text-main);
      padding: 8px 16px;
      border-radius: var(--radius-md);
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .btn:hover { background: rgba(255, 255, 255, 0.16); }
    .btn-primary { background: var(--accent-blue); color: #0f172a; border: none; }
    .btn-primary:hover { background: #7dd3fc; }

    .timestamp-display {
      font-family: monospace;
      font-size: 1rem;
      font-weight: 700;
      min-width: 180px;
    }

    .mode-indicator {
      font-size: 0.75rem;
      padding: 2px 8px;
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.1);
      color: var(--accent-blue);
    }

    .slider-container { width: 100%; display: flex; align-items: center; }
    .timeline-slider {
      -webkit-appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: rgba(255, 255, 255, 0.15);
      outline: none;
      cursor: pointer;
    }
    .timeline-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--accent-blue);
      cursor: pointer;
    }

    .timeline-markers {
      display: flex;
      justify-content: space-between;
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-top: 4px;
    }
  </style>

  <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
  <script src="https://unpkg.com/pmtiles@3.0.6/dist/pmtiles.js"></script>
</head>

<body>
  <!-- WebGL Render Target -->
  <main id="map" aria-label="Interactive Weather Map"></main>

  <!-- On-Screen Diagnostics Logger -->
  <div id="diagnostics" aria-live="polite">
    <div>[SYS] Diagnostic Engine Initialized</div>
  </div>

  <header class="glass-panel">
    <div class="brand">
      <h1>LiteRadar</h1>
      <span class="badge-live">MRMS 2-Min</span>
    </div>
    <div class="telemetry">
      <div class="telemetry-item">Pipeline: <span>4.2s</span></div>
      <div class="telemetry-item">GPU: <span>Lagrangian</span></div>
    </div>
  </header>

  <aside class="legend-container glass-panel">
    <div class="legend-title">Reflectivity (dBZ)</div>
    <div class="legend-bar"></div>
    <div class="legend-labels">
      <span>5</span><span>20</span><span>35</span><span>50</span><span>65+</span>
    </div>
  </aside>

  <nav class="controls-container glass-panel">
    <div class="controls-row">
      <div class="playback-group">
        <button id="playBtn" class="btn btn-primary">
          <svg id="playIcon" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          <span id="playText">Play</span>
        </button>
        <button id="nowBtn" class="btn">LIVE</button>
      </div>

      <div class="playback-group">
        <span id="modeBadge" class="mode-indicator">OBSERVED</span>
        <div id="timeDisplay" class="timestamp-display">2026-07-24 --:-- UTC</div>
      </div>
    </div>

    <div class="slider-container">
      <input type="range" id="timelineSlider" class="timeline-slider" min="-60" max="60" value="0" step="1" />
    </div>
    <div class="timeline-markers">
      <span>-60 min</span><span>NOW</span><span>+60 min</span>
    </div>
  </nav>

  <script>
    // 1. Diagnostic Interceptor (Captures console.error and console.warn to UI)
    const logDOM = document.getElementById('diagnostics');
    const systemLog = (msg, type = 'INFO') => {
      const color = type === 'ERR' ? '#ef4444' : type === 'WARN' ? '#f59e0b' : '#32cd32';
      logDOM.innerHTML += `<div style="color: ${color}; padding-top: 4px;">[${type}] ${msg}</div>`;
      logDOM.scrollTop = logDOM.scrollHeight;
    };

    const originalError = console.error;
    console.error = function(...args) {
      systemLog(args.join(' '), 'ERR');
      originalError.apply(console, args);
    };

    const originalWarn = console.warn;
    console.warn = function(...args) {
      systemLog(args.join(' '), 'WARN');
      originalWarn.apply(console, args);
    };

    // 2. Initialize PMTiles
    try {
      if (typeof pmtiles !== 'undefined') {
        const protocol = new pmtiles.Protocol();
        maplibregl.addProtocol("pmtiles", protocol.tile);
        systemLog('PMTiles Protocol Registered');
      }
    } catch (err) {
      console.error("PMTiles Init failed:", err.message);
    }

    // 3. Fallback Basemap Initialization
    // We use standard OpenStreetMap tiles here. CARTO heavily filters referers from GitHub Pages.
    systemLog('Initializing MapLibre GL JS Engine...');
    const map = new maplibregl.Map({
      container: 'map',
      style: {
        version: 8,
        sources: {
          'osm-basemap': {
            type: 'raster',
            tiles: ['https://tile.openstreetmap.org/{z}/{x}/{y}.png'],
            tileSize: 256,
            attribution: '&copy; OpenStreetMap Contributors'
          }
        },
        layers: [
          {
            id: 'background',
            type: 'background',
            paint: { 'background-color': '#0f172a' } 
          },
          {
            id: 'osm-layer',
            type: 'raster',
            source: 'osm-basemap',
            minzoom: 0,
            maxzoom: 19,
            paint: {
              'raster-opacity': 0.6,
              'raster-saturation': -1, // Make OSM dark-mode compatible
              'raster-contrast': 0.2
            }
          }
        ]
      },
      center: [-97.5164, 35.4676], 
      zoom: 4.8
    });

    map.on('error', (e) => console.error('MapEngine Error:', e.error ? e.error.message : e));
    map.on('webglcontextlost', () => console.error('CRITICAL: WebGL Context Lost! GPU Driver crash?'));

    // 4. WebGL Custom Shader Layer (Strictly WebGL 1.0 Compatible)
    const AdvectionRadarLayer = {
      id: 'mrms-advection-layer',
      type: 'custom',
      renderingMode: '2d',

      onAdd: function (map, gl) {
        systemLog(`WebGL Context Acquired: ${gl.getParameter(gl.VERSION)}`);
        systemLog(`WebGL Renderer: ${gl.getParameter(gl.RENDERER)}`);
        
        this.program = gl.createProgram();

        const vsSource = `
          attribute vec2 a_position;
          attribute vec2 a_uv;
          varying vec2 v_texCoord;
          uniform mat4 u_matrix;
          void main() {
            v_texCoord = a_uv;
            gl_Position = u_matrix * vec4(a_position, 0.0, 1.0);
          }
        `;

        const fsSource = `
          precision mediump float;
          varying vec2 v_texCoord;
          uniform float u_time_offset; 
          uniform float u_global_time; 

          vec3 generateSyntheticMRMS(vec2 uv, float t) {
            vec2 p = uv * 8.0;
            float storm1 = sin(p.x + t * 0.1) * cos(p.y + t * 0.05);
            float storm2 = sin(p.x * 2.5 - t * 0.2) * sin(p.y * 2.0 + t * 0.15);
            float dBZ = max(0.0, (storm1 + storm2 - 0.4) * 50.0);
            
            float u_vec = 0.015 + 0.005 * sin(uv.y * 10.0);
            float v_vec = -0.008 + 0.003 * cos(uv.x * 10.0);
            return vec3(dBZ, u_vec, v_vec);
          }

          vec4 applyRadarColorTable(float dbz) {
            if (dbz < 5.0) return vec4(0.0);
            if (dbz < 15.0) return vec4(0.0, 0.92, 0.92, 0.4);
            if (dbz < 25.0) return vec4(0.0, 0.0, 0.96, 0.6);
            if (dbz < 35.0) return vec4(0.0, 0.8, 0.0, 0.75);
            if (dbz < 45.0) return vec4(1.0, 1.0, 0.0, 0.85);
            if (dbz < 55.0) return vec4(1.0, 0.47, 0.0, 0.9);
            if (dbz < 65.0) return vec4(1.0, 0.0, 0.0, 0.95);
            return vec4(0.9, 0.0, 0.9, 1.0); 
          }

          void main() {
            vec2 velocity = generateSyntheticMRMS(v_texCoord, u_global_time).gb;
            vec2 advectedUV = v_texCoord - (velocity * (u_time_offset / 10.0));
            float finalDBZ = generateSyntheticMRMS(advectedUV, u_global_time).r;
            gl_FragColor = applyRadarColorTable(finalDBZ);
          }
        `;

        const compileShader = (type, source, name) => {
          const shader = gl.createShader(type);
          gl.shaderSource(shader, source);
          gl.compileShader(shader);
          if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
            console.error(`${name} Shader Error:`, gl.getShaderInfoLog(shader));
            return null;
          }
          return shader;
        };

        const vs = compileShader(gl.VERTEX_SHADER, vsSource, "Vertex");
        const fs = compileShader(gl.FRAGMENT_SHADER, fsSource, "Fragment");
        
        if (!vs || !fs) {
          console.error("Shader compilation failed. Aborting layer add.");
          return;
        }

        gl.attachShader(this.program, vs);
        gl.attachShader(this.program, fs);
        gl.linkProgram(this.program);

        this.aPosition = gl.getAttribLocation(this.program, 'a_position');
        this.aUV = gl.getAttribLocation(this.program, 'a_uv');
        this.uMatrix = gl.getUniformLocation(this.program, 'u_matrix');
        this.uTimeOffset = gl.getUniformLocation(this.program, 'u_time_offset');
        this.uGlobalTime = gl.getUniformLocation(this.program, 'u_global_time');

        const rawGeometry = [
          -125.0, 24.0,  0.0, 1.0,
           -66.0, 24.0,  1.0, 1.0,
          -125.0, 50.0,  0.0, 0.0,
          -125.0, 50.0,  0.0, 0.0,
           -66.0, 24.0,  1.0, 1.0,
           -66.0, 50.0,  1.0, 0.0
        ];

        this.vertexData = new Float32Array(24);
        for (let i = 0; i < 6; i++) {
          const coord = maplibregl.MercatorCoordinate.fromLngLat([rawGeometry[i * 4], rawGeometry[i * 4 + 1]]);
          this.vertexData[i * 4] = coord.x;
          this.vertexData[i * 4 + 1] = coord.y;
          this.vertexData[i * 4 + 2] = rawGeometry[i * 4 + 2];
          this.vertexData[i * 4 + 3] = rawGeometry[i * 4 + 3];
        }

        this.buffer = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, this.buffer);
        gl.bufferData(gl.ARRAY_BUFFER, this.vertexData, gl.STATIC_DRAW);
        
        systemLog('WebGL Advection Layer Attached Successfully');
      },

      render: function (gl, matrix) {
        if (!this.program) return;
        gl.useProgram(this.program);
        gl.enable(gl.BLEND);
        gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);
        gl.bindBuffer(gl.ARRAY_BUFFER, this.buffer);
        
        gl.enableVertexAttribArray(this.aPosition);
        gl.vertexAttribPointer(this.aPosition, 2, gl.FLOAT, false, 16, 0);

        gl.enableVertexAttribArray(this.aUV);
        gl.vertexAttribPointer(this.aUV, 2, gl.FLOAT, false, 16, 8);

        gl.uniformMatrix4fv(this.uMatrix, false, matrix);
        gl.uniform1f(this.uTimeOffset, window.currentOffset || 0.0);
        gl.uniform1f(this.uGlobalTime, (performance.now() / 1000.0) % 3600.0);

        gl.drawArrays(gl.TRIANGLES, 0, 6);
      }
    };

    map.on('load', () => {
      systemLog('Map Basemap Loaded.');
      try {
        map.addLayer(AdvectionRadarLayer);
      } catch(err) {
        console.error('Failed to add custom WebGL layer:', err.message);
      }
      
      const continuousRepaint = () => {
        map.triggerRepaint();
        requestAnimationFrame(continuousRepaint);
      };
      continuousRepaint();
    });

    // 5. UI Bindings
    const slider = document.getElementById('timelineSlider');
    const playBtn = document.getElementById('playBtn');
    const playText = document.getElementById('playText');
    const playIcon = document.getElementById('playIcon');
    const nowBtn = document.getElementById('nowBtn');
    const timeDisplay = document.getElementById('timeDisplay');
    const modeBadge = document.getElementById('modeBadge');

    let isPlaying = false;
    let animationFrameId = null;
    window.currentOffset = 0; 

    function updateTimestampUI(offsetMinutes) {
      const targetTime = new Date(new Date().getTime() + offsetMinutes * 60000);
      const hours = String(targetTime.getUTCHours()).padStart(2, '0');
      const mins = String(targetTime.getUTCMinutes()).padStart(2, '0');
      const dateStr = targetTime.toISOString().split('T')[0];
      timeDisplay.textContent = `${dateStr} ${hours}:${mins} UTC`;

      if (offsetMinutes > 2) {
        modeBadge.textContent = 'FORECAST';
        modeBadge.style.color = '#f59e0b';
      } else {
        modeBadge.textContent = 'OBSERVED';
        modeBadge.style.color = 'var(--accent-blue)';
      }
    }

    slider.addEventListener('input', (e) => {
      window.currentOffset = parseFloat(e.target.value);
      updateTimestampUI(window.currentOffset);
    });

    function stepAnimation() {
      if (!isPlaying) return;
      window.currentOffset += 0.4;
      if (window.currentOffset > 60) window.currentOffset = -60;
      slider.value = window.currentOffset;
      updateTimestampUI(window.currentOffset);
      animationFrameId = requestAnimationFrame(stepAnimation);
    }

    playBtn.addEventListener('click', () => {
      isPlaying = !isPlaying;
      if (isPlaying) {
        playText.textContent = 'Pause';
        playIcon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
        stepAnimation();
      } else {
        playText.textContent = 'Play';
        playIcon.innerHTML = '<path d="M8 5v14l11-7z"/>';
        if (animationFrameId) cancelAnimationFrame(animationFrameId);
      }
    });

    nowBtn.addEventListener('click', () => {
      window.currentOffset = 0;
      slider.value = 0;
      updateTimestampUI(0);
    });

    updateTimestampUI(0);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="LiteRadar - GPU Advection NOAA MRMS Radar" />
  <title>LiteRadar — Real-Time NOAA MRMS GPU Advection</title>

  <!-- MapLibre GL JS Stylesheet -->
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@3.6.1/dist/maplibre-gl.css" />

  <style>
    /* 
      Modern CSS Custom Properties for Theming 
      Follows W3C specifications for variables
    */
    :root {
      --bg-dark: #0f172a;
      --panel-bg: rgba(15, 23, 42, 0.85);
      --panel-border: rgba(255, 255, 255, 0.12);
      --accent-blue: #38bdf8;
      --accent-green: #22c55e;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --radius-lg: 12px;
      --radius-md: 8px;
      --font-stack: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body, html {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: var(--bg-dark);
      font-family: var(--font-stack);
      color: var(--text-main);
      -webkit-font-smoothing: antialiased;
    }

    /* Fullscreen Map Canvas */
    #map {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    /* Glassmorphism UI Panels */
    .glass-panel {
      background: var(--panel-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px); /* Safari support */
      border: 1px solid var(--panel-border);
      border-radius: var(--radius-lg);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      z-index: 10;
    }

    /* Semantic Header Layout */
    header {
      position: absolute;
      top: 16px;
      left: 16px;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand h1 {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .badge-live {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(34, 197, 94, 0.15);
      color: var(--accent-green);
      border: 1px solid rgba(34, 197, 94, 0.3);
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
    }

    .badge-live::before {
      content: "";
      width: 6px;
      height: 6px;
      background-color: var(--accent-green);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--accent-green);
    }

    /* Telemetry Data Display */
    .telemetry {
      display: flex;
      gap: 12px;
      font-size: 0.8rem;
      color: var(--text-muted);
      border-left: 1px solid var(--panel-border);
      padding-left: 16px;
    }

    .telemetry-item span {
      color: var(--text-main);
      font-weight: 600;
    }

    /* Legend Overlay */
    .legend-container {
      position: absolute;
      top: 16px;
      right: 16px;
      padding: 12px 16px;
      width: 240px;
    }

    .legend-title {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .legend-bar {
      height: 10px;
      border-radius: 5px;
      background: linear-gradient(
        to right,
        rgba(0, 236, 236, 0.8),
        rgba(1, 160, 246, 0.8),
        rgba(0, 0, 246, 0.8),
        rgba(0, 255, 0, 0.8),
        rgba(0, 200, 0, 0.8),
        rgba(0, 140, 0, 0.8),
        rgba(255, 255, 0, 0.8),
        rgba(231, 192, 0, 0.8),
        rgba(255, 120, 0, 0.8),
        rgba(255, 0, 0, 0.8),
        rgba(200, 0, 0, 0.8),
        rgba(255, 0, 255, 0.8)
      );
    }

    .legend-labels {
      display: flex;
      justify-content: space-between;
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* Playback & Scrubbing Controls */
    .controls-container {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      width: calc(100% - 32px);
      max-width: 860px;
      padding: 16px 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .controls-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .playback-group {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    /* WCAG Compliant Buttons */
    .btn {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid var(--panel-border);
      color: var(--text-main);
      padding: 8px 16px;
      border-radius: var(--radius-md);
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 500;
      transition: background 0.2s ease, border-color 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .btn:hover, .btn:focus-visible {
      background: rgba(255, 255, 255, 0.16);
      border-color: rgba(255, 255, 255, 0.3);
      outline: none;
    }

    .btn-primary {
      background: var(--accent-blue);
      color: #0f172a;
      font-weight: 600;
      border: none;
    }

    .btn-primary:hover {
      background: #7dd3fc;
    }

    .timestamp-display {
      font-family: monospace;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      min-width: 180px;
    }

    .mode-indicator {
      font-size: 0.75rem;
      padding: 2px 8px;
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.1);
      color: var(--accent-blue);
    }

    /* Custom Range Input */
    .slider-container {
      position: relative;
      width: 100%;
      display: flex;
      align-items: center;
    }

    .timeline-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: rgba(255, 255, 255, 0.15);
      outline: none;
      cursor: pointer;
    }

    .timeline-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--accent-blue);
      cursor: pointer;
      box-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
      transition: transform 0.1s ease;
    }

    .timeline-slider::-webkit-slider-thumb:hover {
      transform: scale(1.2);
    }

    .timeline-markers {
      display: flex;
      justify-content: space-between;
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* Responsive Media Queries */
    @media (max-width: 768px) {
      .telemetry { display: none; }
      .legend-container { display: none; }
      header { top: 12px; left: 12px; padding: 8px 12px; }
      .controls-container { bottom: 12px; padding: 12px 16px; }
      .timestamp-display { font-size: 0.85rem; min-width: auto; }
    }
  </style>

  <!-- External SDKs -->
  <script src="https://unpkg.com/maplibre-gl@3.6.1/dist/maplibre-gl.js"></script>
  <script src="https://unpkg.com/pmtiles@3.0.6/dist/pmtiles.js"></script>
</head>

<body>
  <!-- Render Target -->
  <main id="map" aria-label="Interactive Weather Map"></main>

  <header class="glass-panel">
    <div class="brand">
      <h1>LiteRadar</h1>
      <span class="badge-live">MRMS 2-Min</span>
    </div>
    <div class="telemetry">
      <div class="telemetry-item">Pipeline: <span>4.2s (I/O Bound)</span></div>
      <div class="telemetry-item">Egress: <span>Cloudflare R2 ($0)</span></div>
      <div class="telemetry-item">GPU: <span>Lagrangian Shader</span></div>
    </div>
  </header>

  <aside class="legend-container glass-panel" aria-hidden="true">
    <div class="legend-title">Reflectivity (dBZ)</div>
    <div class="legend-bar"></div>
    <div class="legend-labels">
      <span>5</span>
      <span>20</span>
      <span>35</span>
      <span>50</span>
      <span>65+</span>
    </div>
  </aside>

  <nav class="controls-container glass-panel" aria-label="Playback Controls">
    <div class="controls-row">
      <div class="playback-group">
        <button id="playBtn" class="btn btn-primary" aria-label="Play/Pause Timeline">
          <svg id="playIcon" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          <span id="playText">Play</span>
        </button>
        <button id="nowBtn" class="btn" aria-label="Jump to Live">LIVE</button>
      </div>

      <div class="playback-group">
        <span id="modeBadge" class="mode-indicator">OBSERVED</span>
        <div id="timeDisplay" class="timestamp-display" aria-live="polite">2026-07-24 --:-- UTC</div>
      </div>
    </div>

    <div class="slider-container">
      <input 
        type="range" 
        id="timelineSlider" 
        class="timeline-slider" 
        min="-60" 
        max="60" 
        value="0" 
        step="1" 
        aria-label="Advection Scrubbing Timeline"
      />
    </div>
    <div class="timeline-markers" aria-hidden="true">
      <span>-60 min (Observed)</span>
      <span>NOW (NOAA MRMS)</span>
      <span>+60 min (Advection Forecast)</span>
    </div>
  </nav>

  <script>
    // 1. Initialize MapLibre & Web Worker Workarounds
    maplibregl.setWorkerCount(0); 

    const protocol = new pmtiles.Protocol();
    maplibregl.addProtocol("pmtiles", protocol.tile);

    // 2. Setup Basemap (Fixed CARTO URL without the invalid {r} token)
    const map = new maplibregl.Map({
      container: 'map',
      style: {
        version: 8,
        sources: {
          'carto-dark': {
            type: 'raster',
            tiles: ['https://a.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png'], // Corrected URL
            tileSize: 256,
            attribution: '&copy; CARTO, OpenStreetMap'
          }
        },
        layers: [
          {
            id: 'carto-dark-layer',
            type: 'raster',
            source: 'carto-dark',
            minzoom: 0,
            maxzoom: 19
          }
        ]
      },
      center: [-97.5164, 35.4676], // Oklahoma City
      zoom: 4.8,
      pitch: 0
    });

    map.addControl(new maplibregl.NavigationControl(), 'top-left');

    // 3. Construct Custom WebGL Layer for Advection
    const AdvectionRadarLayer = {
      id: 'mrms-advection-layer',
      type: 'custom',
      renderingMode: '2d',

      onAdd: function (map, gl) {
        this.program = gl.createProgram();

        // Vertex Shader: Now properly accepts explicit UV mapping
        const vsSource = `
          attribute vec2 a_position;
          attribute vec2 a_uv;
          varying vec2 v_texCoord;
          uniform mat4 u_matrix;

          void main() {
            v_texCoord = a_uv;
            gl_Position = u_matrix * vec4(a_position, 0.0, 1.0);
          }
        `;

        // Fragment Shader: Lagrangian Interpolation over time
        const fsSource = `
          precision mediump float;

          varying vec2 v_texCoord;
          uniform float u_time_offset; 
          uniform float u_global_time; 

          // Procedural Storm Generation (Simulating Data Retrieval)
          vec3 generateSyntheticMRMS(vec2 uv, float t) {
            vec2 p = uv * 8.0;
            float storm1 = sin(p.x + t * 0.1) * cos(p.y + t * 0.05);
            float storm2 = sin(p.x * 2.5 - t * 0.2) * sin(p.y * 2.0 + t * 0.15);
            
            float dBZ = max(0.0, (storm1 + storm2 - 0.4) * 50.0);
            
            // Optical Flow vectors
            float u_vec = 0.015 + 0.005 * sin(uv.y * 10.0);
            float v_vec = -0.008 + 0.003 * cos(uv.x * 10.0);

            return vec3(dBZ, u_vec, v_vec);
          }

          vec4 applyRadarColorTable(float dbz) {
            if (dbz < 5.0) return vec4(0.0);
            if (dbz < 15.0) return vec4(0.0, 0.92, 0.92, 0.4);
            if (dbz < 25.0) return vec4(0.0, 0.0, 0.96, 0.6);
            if (dbz < 35.0) return vec4(0.0, 0.8, 0.0, 0.75);
            if (dbz < 45.0) return vec4(1.0, 1.0, 0.0, 0.85);
            if (dbz < 55.0) return vec4(1.0, 0.47, 0.0, 0.9);
            if (dbz < 65.0) return vec4(1.0, 0.0, 0.0, 0.95);
            return vec4(0.9, 0.0, 0.9, 1.0); 
          }

          void main() {
            // Apply physical advection step
            vec2 velocity = generateSyntheticMRMS(v_texCoord, u_global_time).gb;
            vec2 advectedUV = v_texCoord - (velocity * (u_time_offset / 10.0));

            float finalDBZ = generateSyntheticMRMS(advectedUV, u_global_time).r;
            gl_FragColor = applyRadarColorTable(finalDBZ);
          }
        `;

        const compileShader = (type, source) => {
          const shader = gl.createShader(type);
          gl.shaderSource(shader, source);
          gl.compileShader(shader);
          if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
            console.error('Shader compilation error:', gl.getShaderInfoLog(shader));
          }
          return shader;
        };

        gl.attachShader(this.program, compileShader(gl.VERTEX_SHADER, vsSource));
        gl.attachShader(this.program, compileShader(gl.FRAGMENT_SHADER, fsSource));
        gl.linkProgram(this.program);

        // Fetch Attribute Locations
        this.aPosition = gl.getAttribLocation(this.program, 'a_position');
        this.aUV = gl.getAttribLocation(this.program, 'a_uv');
        this.uMatrix = gl.getUniformLocation(this.program, 'u_matrix');
        this.uTimeOffset = gl.getUniformLocation(this.program, 'u_time_offset');
        this.uGlobalTime = gl.getUniformLocation(this.program, 'u_global_time');

        // Geodesic Quad Definition: [Lng, Lat, U, V]
        const rawGeometry = [
          -125.0, 24.0,  0.0, 1.0,
           -66.0, 24.0,  1.0, 1.0,
          -125.0, 50.0,  0.0, 0.0,
          -125.0, 50.0,  0.0, 0.0,
           -66.0, 24.0,  1.0, 1.0,
           -66.0, 50.0,  1.0, 0.0
        ];

        // Interleaved VBO generation for high-performance memory layout
        this.vertexData = new Float32Array(24);
        for (let i = 0; i < 6; i++) {
          const coord = maplibregl.MercatorCoordinate.fromLngLat([rawGeometry[i * 4], rawGeometry[i * 4 + 1]]);
          this.vertexData[i * 4] = coord.x;
          this.vertexData[i * 4 + 1] = coord.y;
          this.vertexData[i * 4 + 2] = rawGeometry[i * 4 + 2];
          this.vertexData[i * 4 + 3] = rawGeometry[i * 4 + 3];
        }

        this.buffer = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, this.buffer);
        gl.bufferData(gl.ARRAY_BUFFER, this.vertexData, gl.STATIC_DRAW);
      },

      render: function (gl, matrix) {
        gl.useProgram(this.program);

        gl.enable(gl.BLEND);
        gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);

        gl.bindBuffer(gl.ARRAY_BUFFER, this.buffer);
        
        // Stride is 16 bytes (4 floats * 4 bytes/float)
        gl.enableVertexAttribArray(this.aPosition);
        gl.vertexAttribPointer(this.aPosition, 2, gl.FLOAT, false, 16, 0);

        gl.enableVertexAttribArray(this.aUV);
        gl.vertexAttribPointer(this.aUV, 2, gl.FLOAT, false, 16, 8);

        // Uniform execution
        gl.uniformMatrix4fv(this.uMatrix, false, matrix);
        gl.uniform1f(this.uTimeOffset, window.currentOffset || 0.0);
        gl.uniform1f(this.uGlobalTime, (performance.now() / 1000.0) % 3600.0);

        gl.drawArrays(gl.TRIANGLES, 0, 6);
      }
    };

    map.on('load', () => map.addLayer(AdvectionRadarLayer));

    // 4. UI Logic Integration
    const slider = document.getElementById('timelineSlider');
    const playBtn = document.getElementById('playBtn');
    const playText = document.getElementById('playText');
    const playIcon = document.getElementById('playIcon');
    const nowBtn = document.getElementById('nowBtn');
    const timeDisplay = document.getElementById('timeDisplay');
    const modeBadge = document.getElementById('modeBadge');

    let isPlaying = false;
    let animationFrameId = null;
    window.currentOffset = 0; 

    function updateTimestampUI(offsetMinutes) {
      const targetTime = new Date(new Date().getTime() + offsetMinutes * 60000);
      const hours = String(targetTime.getUTCHours()).padStart(2, '0');
      const mins = String(targetTime.getUTCMinutes()).padStart(2, '0');
      const dateStr = targetTime.toISOString().split('T')[0];

      timeDisplay.textContent = `${dateStr} ${hours}:${mins} UTC`;

      if (offsetMinutes > 2) {
        modeBadge.textContent = 'ADVECTION FORECAST';
        modeBadge.style.color = '#f59e0b';
        modeBadge.style.background = 'rgba(245, 158, 11, 0.15)';
      } else {
        modeBadge.textContent = 'OBSERVED MRMS';
        modeBadge.style.color = 'var(--accent-blue)';
        modeBadge.style.background = 'rgba(56, 189, 248, 0.15)';
      }
    }

    slider.addEventListener('input', (e) => {
      window.currentOffset = parseFloat(e.target.value);
      updateTimestampUI(window.currentOffset);
      map.triggerRepaint(); // Forces WebGL Custom Layer refresh
    });

    function stepAnimation() {
      if (!isPlaying) return;
      window.currentOffset += 0.4;
      if (window.currentOffset > 60) window.currentOffset = -60;

      slider.value = window.currentOffset;
      updateTimestampUI(window.currentOffset);
      map.triggerRepaint();

      animationFrameId = requestAnimationFrame(stepAnimation);
    }

    playBtn.addEventListener('click', () => {
      isPlaying = !isPlaying;
      if (isPlaying) {
        playText.textContent = 'Pause';
        playIcon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
        stepAnimation();
      } else {
        playText.textContent = 'Play';
        playIcon.innerHTML = '<path d="M8 5v14l11-7z"/>';
        if (animationFrameId) cancelAnimationFrame(animationFrameId);
      }
    });

    nowBtn.addEventListener('click', () => {
      window.currentOffset = 0;
      slider.value = 0;
      updateTimestampUI(0);
      map.triggerRepaint();
    });

    updateTimestampUI(0);
  </script>
</body>
</html>

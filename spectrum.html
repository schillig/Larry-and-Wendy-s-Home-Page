<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Professional Web-Based Audio Spectrum Analyzer and Oscilloscope">
    <title>Audio Spectrum Visualizer - HUD Edition</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎛️</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Strict, Industrial CSS Resets per W3C Standards */
        body, html {
            height: 100%;
            margin: 0;
            background-color: #171717; 
            color: #d4d4d4; 
        }
        
        /* Custom Industrial Scrollbar */
        .industrial-scroll::-webkit-scrollbar { width: 10px; }
        .industrial-scroll::-webkit-scrollbar-track { background: #262626; border-left: 1px solid #404040; }
        .industrial-scroll::-webkit-scrollbar-thumb { background: #525252; border-radius: 0px; border: 1px solid #262626; }
        .industrial-scroll::-webkit-scrollbar-thumb:hover { background: #a3a3a3; }

        .canvas-container {
            border: 1px solid #525252;
            cursor: crosshair;
            /* Disable native browser touch behaviors to route raw gestures directly to JS */
            touch-action: none; 
        }
        
        /* Utilitarian Range Sliders for remaining controls */
        input[type=range] {
            -webkit-appearance: none;
            background: transparent;
            padding: 6px 0; 
            cursor: pointer;
            width: 100%;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 8px;
            background: #a3a3a3;
            border: 1px solid #262626;
            border-radius: 0;
            margin-top: -6px;
        }
        input[type=range]::-webkit-slider-runnable-track {
            height: 4px;
            background: #404040;
            border: 1px solid #262626;
            border-radius: 0;
        }
        
        input[type=range]:focus { outline: none; }
        input[type=range]:focus::-webkit-slider-thumb { background: #d4d4d4; }
        
        button {
            border-radius: 0 !important;
            text-transform: uppercase;
        }

        /* OSD HUD Text Shadow for legibility over bright signals */
        .osd-text {
            text-shadow: 1px 1px 2px rgba(0,0,0,0.95), -1px -1px 2px rgba(0,0,0,0.95);
        }
    </style>
</head>
<body class="flex flex-col items-center px-1 md:px-2 pt-1 pb-2 font-sans h-screen overflow-hidden relative">

    <!-- Toast Error/Notification Container -->
    <div id="toast-container" class="fixed top-5 left-1/2 transform -translate-x-1/2 z-50 flex flex-col items-center w-full px-4 pointer-events-none">
        <div id="message-box" class="transition-all duration-300 opacity-0 transform -translate-y-4 p-3 border shadow-none text-xs font-mono max-w-xl text-center w-full">
        </div>
    </div>

    <!-- Header -->
    <header class="w-full max-w-7xl flex-none flex flex-row justify-between items-center bg-neutral-800 py-1 px-2 border-b border-neutral-600 mb-2">
        <div class="flex items-center gap-1.5 md:gap-2">
            <h1 class="text-[10px] md:text-sm font-bold text-neutral-100 uppercase tracking-wider flex items-center whitespace-nowrap">
                <span class="hidden sm:inline">Signal Analyzer</span>
                <span class="sm:hidden">Analyzer</span>
                <span class="text-neutral-500 text-[8px] md:text-[9px] font-mono ml-1">V1.49.0</span>
            </h1>
            <div class="text-[9px] uppercase font-bold text-neutral-400">
                <span id="engine-status" class="text-yellow-500 font-mono bg-neutral-900 px-1 border border-neutral-700">READY</span>
            </div>
        </div>

        <div class="flex gap-1">
            <button id="btn-mic" class="px-2 py-0.5 bg-neutral-700 hover:bg-neutral-600 border border-neutral-500 text-neutral-200 transition-none text-[9px] font-bold">
                Mic
            </button>
            <button id="btn-system" class="px-2 py-0.5 bg-neutral-700 hover:bg-neutral-600 border border-neutral-500 text-neutral-200 transition-none text-[9px] font-bold" title="Requires Localhost or HTTPS">
                Sys Audio
            </button>
            <button id="btn-stop" class="hidden px-2 py-0.5 bg-red-900 hover:bg-red-800 border border-red-700 text-red-200 transition-none text-[9px] font-bold">
                Stop
            </button>
        </div>
    </header>

    <main class="w-full max-w-7xl flex-1 flex flex-col gap-2 overflow-hidden">

        <!-- Canvas Container with On-Screen Display (OSD) Overlay -->
        <section id="displays-wrapper" class="order-1 md:order-2 w-full flex-1 flex flex-col gap-2 min-h-[250px]">
            <div id="display-main" class="canvas-container w-full flex-1 bg-neutral-950 relative" title="1-Finger Pan / 2-Finger Zoom / Wheel Axes / Dbl-Click Reset">
                
                <!-- OSD Overlay: pointer-events-none lets input gestures pass down to Canvas -->
                <div id="osd-layer" class="absolute inset-0 z-30 pointer-events-none flex flex-col justify-between p-1.5 font-mono text-[9px] md:text-[11px] font-bold text-neutral-300 pb-[30px] pl-[60px] pr-2">
                    
                    <!-- Top Readouts -->
                    <div class="flex justify-between items-start w-full relative">
                        <div class="flex flex-col gap-0.5 osd-text">
                            <span id="osd-ch-combined" class="text-cyan-400">CH L+R: --</span>
                            <span id="osd-ch-left" class="text-green-400">CH L: --</span>
                            <span id="osd-ch-right" class="text-pink-400">CH R: --</span>
                        </div>
                        
                        <!-- Top-Center Measurement Cursors -->
                        <div id="osd-cursors" class="absolute top-0 left-1/2 transform -translate-x-1/2 flex flex-col items-center gap-0.5 osd-text w-full max-w-[280px]" style="display: none;">
                            <div id="osd-curs-x-container" class="flex gap-2 text-green-400 bg-neutral-900/80 px-2 py-0.5 border border-neutral-700 rounded" style="display: none;">
                                <span><span id="osd-lbl-x1" class="text-neutral-400">X1:</span> <span id="osd-val-x1">--</span></span>
                                <span><span id="osd-lbl-x2" class="text-neutral-400">X2:</span> <span id="osd-val-x2">--</span></span>
                                <span><span id="osd-lbl-dx" class="text-neutral-400">ΔX:</span> <span id="osd-val-dx">--</span></span>
                            </div>
                            <div id="osd-curs-y-container" class="flex gap-2 text-purple-400 bg-neutral-900/80 px-2 py-0.5 border border-neutral-700 rounded" style="display: none;">
                                <span><span id="osd-lbl-y1" class="text-neutral-400">Y1:</span> <span id="osd-val-y1">--</span></span>
                                <span><span id="osd-lbl-y2" class="text-neutral-400">Y2:</span> <span id="osd-val-y2">--</span></span>
                                <span><span id="osd-lbl-dy" class="text-neutral-400">ΔY:</span> <span id="osd-val-dy">--</span></span>
                            </div>
                        </div>

                        <div class="flex flex-col items-end gap-0.5 text-right osd-text">
                            <span id="osd-trigger" class="text-white">TRIG: AUTO</span>
                            <span id="osd-mode" class="text-yellow-400">MODE: SPECTRUM</span>
                        </div>
                    </div>
                    
                    <!-- Bottom Readouts -->
                    <div class="flex justify-between items-end w-full">
                        <div class="flex flex-col gap-0.5 osd-text">
                            <span id="osd-timebase" class="text-white">M: --</span>
                            <span id="osd-memory" class="text-neutral-400">POS: --</span>
                        </div>
                        <div class="flex flex-col items-end gap-0.5 text-right osd-text">
                            <span id="osd-freq-span" class="text-white">SPAN: --</span>
                            <span id="osd-db-span" class="text-neutral-400">SCALE: --</span>
                        </div>
                    </div>
                </div>

                <div class="ms-row-badge absolute top-12 right-2 text-[9px] font-mono font-bold text-neutral-400 z-20 bg-neutral-900/80 px-1 border border-neutral-700" style="display: none;">
                    <span class="val">--</span> ms/row
                </div>

                <canvas id="wf-main" class="absolute inset-0 w-full h-full block z-0"></canvas>
                <canvas id="vis-main" class="absolute inset-0 w-full h-full block z-10"></canvas>
            </div>
        </section>

        <!-- Bench Controls -->
        <section class="order-2 md:order-1 w-full flex-none overflow-y-auto industrial-scroll pr-1 pb-2 flex flex-col gap-1 max-h-[45vh] md:max-h-none">
            
            <div class="w-full flex justify-between items-end px-1 flex-none">
                <h2 class="text-neutral-500 font-bold text-[10px] tracking-widest uppercase">Bench Controls</h2>
                <button id="btn-reset" class="text-[10px] uppercase font-bold text-neutral-400 hover:text-neutral-200 transition-none">
                    [ Restore Defaults ]
                </button>
            </div>

            <div class="bg-neutral-800 p-3 md:p-4 border border-neutral-600 grid grid-cols-1 md:grid-cols-2 xl:grid-cols-6 gap-x-6 gap-y-4 w-full flex-none">
                
                <div class="flex flex-col gap-2">
                    <h3 class="text-[10px] uppercase tracking-wider text-neutral-500 font-bold border-b border-neutral-600 pb-1">Routing</h3>
                    <div class="flex gap-1 mt-1">
                        <button id="btn-show-combined" class="flex-1 py-1 bg-neutral-600 border border-neutral-500 text-[10px] font-bold text-white shadow-[0_2px_0_#22d3ee]">L+R</button>
                        <button id="btn-show-left" class="flex-1 py-1 bg-neutral-800 border border-neutral-600 text-[10px] font-bold text-neutral-400">L</button>
                        <button id="btn-show-right" class="flex-1 py-1 bg-neutral-800 border border-neutral-600 text-[10px] font-bold text-neutral-400">R</button>
                    </div>
                    <button id="btn-mode" class="py-1 mt-1 bg-blue-800 hover:bg-blue-700 border border-blue-600 text-[10px] font-bold text-white">MODE: SPECTRUM</button>
                </div>

                <div class="flex flex-col gap-3">
                    <h3 class="text-[10px] uppercase tracking-wider text-neutral-500 font-bold border-b border-neutral-600 pb-1">Processing</h3>
                    <div class="flex flex-col gap-0.5">
                        <label for="gain" class="text-[9px] font-bold uppercase text-neutral-400 flex justify-between">
                            <span>Gain</span>
                            <span id="gain-value" class="text-cyan-400 font-mono">2.0x</span>
                        </label>
                        <input type="range" id="gain" min="0.1" max="10" step="0.1" value="2">
                    </div>
                    <div id="avg-container" class="flex flex-col gap-0.5 mode-spec">
                        <label for="avg" class="text-[9px] font-bold uppercase text-neutral-400 flex justify-between">
                            <span>Average</span>
                            <span id="avg-value" class="text-cyan-400 font-mono">OFF</span>
                        </label>
                        <input type="range" id="avg" min="0" max="0.98" step="0.02" value="0">
                    </div>
                    <div class="flex gap-1 mt-0.5">
                        <button id="btn-freeze" class="flex-1 py-1 bg-neutral-800 hover:bg-neutral-700 border border-neutral-600 text-[9px] font-bold text-neutral-300">FREEZE: OFF</button>
                        <button id="btn-peaks" class="flex-1 py-1 bg-neutral-800 hover:bg-neutral-700 border border-neutral-600 text-[9px] font-bold text-neutral-300 mode-spec">PEAKS: OFF</button>
                    </div>
                </div>

                <div class="flex flex-col gap-3">
                    <h3 class="text-[10px] uppercase tracking-wider text-neutral-500 font-bold border-b border-neutral-600 pb-1">Timebase / FFT</h3>
                    <div class="flex flex-col gap-0.5">
                        <label for="bandwidth" class="text-[9px] font-bold uppercase text-neutral-400 flex justify-between">
                            <span>FFT Size</span>
                            <span id="bandwidth-value" class="text-cyan-400 font-mono">2048</span>
                        </label>
                        <input type="range" id="bandwidth" min="5" max="15" step="1" value="11">
                    </div>
                    <button id="btn-scale" class="py-1.5 mt-1 bg-neutral-800 hover:bg-neutral-700 border border-neutral-600 text-[9px] font-bold text-neutral-300 mode-spec w-full">X-SCALE: LINEAR</button>
                </div>

                <div class="flex flex-col gap-2">
                    <h3 class="text-[10px] uppercase tracking-wider text-neutral-500 font-bold border-b border-neutral-600 pb-1">Trigger</h3>
                    <div id="zoom-scope" class="grid grid-cols-1 gap-y-2 mode-scope" style="display: none;">
                        <div id="scope-trigger-btns" class="flex gap-0.5 pt-1">
                            <button id="btn-trig-comb" class="flex-1 py-1 bg-neutral-800 border border-neutral-600 text-[9px] font-bold text-neutral-400">T:L+R</button>
                            <button id="btn-trig-left" class="flex-1 py-1 bg-neutral-800 border border-neutral-600 text-[9px] font-bold text-neutral-400">T:L</button>
                            <button id="btn-trig-right" class="flex-1 py-1 bg-neutral-800 border border-neutral-600 text-[9px] font-bold text-neutral-400">T:R</button>
                            <button id="btn-trig-oneshot" class="flex-1 py-1 bg-neutral-800 border border-neutral-600 text-[9px] font-bold text-neutral-400">1-SHOT</button>
                        </div>
                    </div>
                </div>

                <div class="flex flex-col gap-2">
                    <h3 class="text-[10px] uppercase tracking-wider text-neutral-500 font-bold border-b border-neutral-600 pb-1">Measurement</h3>
                    <div class="flex gap-1">
                        <button id="btn-cursor-x" class="flex-1 py-1 bg-neutral-800 border border-neutral-600 text-[9px] font-bold text-neutral-400">X-CURS</button>
                        <button id="btn-cursor-y" class="flex-1 py-1 bg-neutral-800 border border-neutral-600 text-[9px] font-bold text-neutral-400">Y-CURS</button>
                    </div>
                </div>

                <div class="flex flex-col gap-2">
                    <h3 class="text-[10px] uppercase tracking-wider text-neutral-500 font-bold border-b border-neutral-600 pb-1">I/O</h3>
                    <button id="btn-mem-capture" class="w-full py-1 bg-neutral-700 hover:bg-neutral-600 border border-neutral-500 text-[10px] font-bold text-white">CAP TO MEM</button>
                    <div class="flex gap-1">
                        <button id="btn-mem-overlay" class="flex-1 py-1 bg-neutral-800 border border-neutral-600 text-[9px] font-bold text-neutral-400">OVERLAY</button>
                        <button id="btn-mem-restore" class="flex-1 py-1 bg-neutral-800 border border-neutral-600 text-[9px] font-bold text-neutral-400">RESTORE</button>
                    </div>
                    <div class="flex gap-1">
                        <button id="btn-mem-save" class="flex-1 py-1 bg-neutral-900 hover:bg-neutral-700 border border-neutral-600 text-[9px] font-bold text-cyan-500">SAVE</button>
                        <button id="btn-mem-load" class="flex-1 py-1 bg-neutral-900 hover:bg-neutral-700 border border-neutral-600 text-[9px] font-bold text-cyan-500">LOAD</button>
                        <input type="file" id="mem-file-input" accept=".json" class="hidden">
                    </div>
                </div>
            </div>
        </section>

    </main>

    <script>
        // ==========================================
        // 1. ENGINE STATE & GLOBAL VARIABLES
        // ==========================================
        
        let audioCtx, gainNode, source, stream, animationId;
        
        let viewMode = 'spectrum'; 
        let isLogScale = false;
        let isFrozen = false;
        let showPeaks = false;
        let averagingAlpha = 0.0; 

        let dummyAudioEl = null;

        // Mathematical State Variables (UI is Headless)
        let displayMaxDb = 0, displayMinDb = -140;
        let zoomMinFreq = 0, zoomMaxFreq = 22000;
        let actualNyquist = 22050; 
        
        let cursorX1Freq = 1000, cursorX2Freq = 5000;
        let cursorY1Db = -40, cursorY2Db = -60;
        let wfCursorY1Px = 50, wfCursorY2Px = 150;
        
        let lastDrawTime = 0;
        let msPerRowAverage = 16.67; 

        let scopeTimeWindowMs = 20; 
        let vertScaleMultiplier = 1.0; 
        let scopeCursorX1Ms = 5, scopeCursorX2Ms = 15;
        let scopeCursorY1Amp = 0.5, scopeCursorY2Amp = -0.5;
        let scopeOffsetXMs = 0;

        let scopeTriggerSource = null; 
        let scopeTriggerLevel = 0.0;
        let isOneShotArmed = false;
        let lastTriggerIndex = 0; 

        let memorySnapshot = null;
        let isMemOverlay = false;

        let cursorsXEnabled = false, cursorsYEnabled = false;
        let activeDrag = null;
        
        let initialPinchDistX = 0;
        let initialPinchDistY = 0;
        let pinchAxis = null; 
        let initialTimebase = null;
        let initialVertScale = null;
        let initialPinchMinFreq = 0, initialPinchMaxFreq = 22000;
        let initialPinchMinDb = -140, initialPinchMaxDb = 0;

        const DEEP_MEM_SECONDS = 6;
        let deepMemLength = 48000 * DEEP_MEM_SECONDS; 
        let deepMemL = new Float32Array(deepMemLength);
        let deepMemR = new Float32Array(deepMemLength);
        let deepMemC = new Float32Array(deepMemLength);
        let deepMemPtr = 0;
        let memNode = null;
        let dummySink = null;

        const statusEl = document.getElementById('engine-status');
        
        // ==========================================
        // 2. MULTIPLEXED CHANNEL TRACKING
        // ==========================================
        
        const mainDisplay = {
            container: document.getElementById('display-main'),
            visCvs: document.getElementById('vis-main'), 
            wfCvs: document.getElementById('wf-main')
        };

        const channels = {
            combined: { active: true, analyser: null, data: null, timeData: null, rawData: null, rawTimeData: null, color: '#22d3ee', fill: 'rgba(34, 211, 238, 0.1)', name: 'L+R', offsetY: 0 },
            left: { active: false, analyser: null, data: null, timeData: null, rawData: null, rawTimeData: null, color: '#4ade80', fill: 'rgba(74, 222, 128, 0.1)', name: 'L', offsetY: 0 },
            right: { active: false, analyser: null, data: null, timeData: null, rawData: null, rawTimeData: null, color: '#f472b6', fill: 'rgba(244, 114, 182, 0.1)', name: 'R', offsetY: 0 }
        };

        // DOM references strictly for the remaining physical sliders
        const controls = {
            gain: { el: document.getElementById('gain'), disp: document.getElementById('gain-value') },
            avg: { el: document.getElementById('avg'), disp: document.getElementById('avg-value') },
            bandwidth: { el: document.getElementById('bandwidth'), disp: document.getElementById('bandwidth-value') }
        };

        // ==========================================
        // 3. UTILITY & HUD OSD FUNCTIONS
        // ==========================================
        function showToast(msg, isError = false) {
            const box = document.getElementById('message-box');
            if (!box) return;
            box.innerHTML = msg;
            box.className = `transition-all duration-300 opacity-100 transform translate-y-0 p-3 border shadow-none text-xs font-mono max-w-xl text-center w-full pointer-events-auto ${
                isError ? 'bg-red-900 border-red-500 text-red-100' : 'bg-neutral-800 border-neutral-500 text-neutral-200'
            }`;
            if (box.timeoutId) clearTimeout(box.timeoutId);
            box.timeoutId = setTimeout(() => {
                box.classList.remove('opacity-100', 'translate-y-0', 'pointer-events-auto');
                box.classList.add('opacity-0', '-translate-y-4', 'pointer-events-none');
            }, 4000);
        }

        const colormap = new Uint8ClampedArray(256 * 4);
        for (let i = 0; i < 256; i++) {
            let t = i / 255;
            let r = Math.max(0, Math.min(1, 1.5 - Math.abs(t * 4 - 3))) * 255;
            let g = Math.max(0, Math.min(1, 1.5 - Math.abs(t * 4 - 2))) * 255;
            let b = Math.max(0, Math.min(1, 1.5 - Math.abs(t * 4 - 1))) * 255;
            if (t < 0.1) { let fade = t / 0.1; b = fade * b + (1 - fade) * 40; } 
            colormap[i*4] = r; colormap[i*4+1] = g; colormap[i*4+2] = b; colormap[i*4+3] = 255; 
        }

        function applyFftSize() {
            let targetSize;
            if (viewMode === 'oscilloscope' || viewMode === 'lissajous') {
                targetSize = 32768; 
            } else {
                targetSize = Math.pow(2, parseInt(controls.bandwidth.el.value));
            }
            Object.values(channels).forEach(ch => {
                if (ch.analyser && ch.analyser.fftSize !== targetSize) {
                    ch.analyser.fftSize = targetSize;
                }
            });
        }

        const getPadding = () => ({ left: 55, bottom: 30 }); 
        
        function getXPosition(freq, cvsWidth) {
            const p = getPadding();
            const graphWidth = cvsWidth - p.left;
            const freqRange = zoomMaxFreq - zoomMinFreq;
            if (!isLogScale) return p.left + ((freq - zoomMinFreq) / freqRange) * graphWidth;
            const logMin = Math.log10(Math.max(1, zoomMinFreq));
            const logMax = Math.log10(zoomMaxFreq);
            return p.left + ((Math.log10(freq) - logMin) / (logMax - logMin)) * graphWidth;
        }

        function getFreqFromX(x, cvsWidth) {
            const p = getPadding();
            const graphWidth = cvsWidth - p.left;
            const normalizedX = Math.max(0, Math.min(1, (x - p.left) / graphWidth));
            if (!isLogScale) return normalizedX * (zoomMaxFreq - zoomMinFreq) + zoomMinFreq;
            const logMin = Math.log10(Math.max(1, zoomMinFreq));
            const logMax = Math.log10(zoomMaxFreq);
            return Math.pow(10, normalizedX * (logMax - logMin) + logMin);
        }

        function getYPosition(db, cvsHeight) {
            const p = getPadding();
            const graphHeight = cvsHeight - p.bottom;
            return graphHeight - ((db - displayMinDb) / (displayMaxDb - displayMinDb)) * graphHeight;
        }

        function getDbFromY(y, cvsHeight) {
            const p = getPadding();
            const graphHeight = cvsHeight - p.bottom;
            const normalizedY = Math.max(0, Math.min(1, (graphHeight - y) / graphHeight));
            return normalizedY * (displayMaxDb - displayMinDb) + displayMinDb;
        }

        function getScopeXPosition(ms, cvsWidth) {
            const p = getPadding();
            return p.left + (ms / scopeTimeWindowMs) * (cvsWidth - p.left);
        }

        function getMsFromScopeX(x, cvsWidth) {
            const p = getPadding();
            const normalizedX = Math.max(0, Math.min(1, (x - p.left) / (cvsWidth - p.left)));
            return normalizedX * scopeTimeWindowMs;
        }

        function getScopeYPosition(amp, cvsHeight) {
            const p = getPadding();
            const h = cvsHeight - p.bottom;
            const visualCeiling = 1.0 / vertScaleMultiplier; 
            return (h / 2) - (amp / visualCeiling) * (h / 2);
        }

        function getAmpFromScopeY(y, cvsHeight) {
            const p = getPadding();
            const h = cvsHeight - p.bottom;
            const visualCeiling = 1.0 / vertScaleMultiplier;
            const normalizedY = ((h / 2) - y) / (h / 2);
            return normalizedY * visualCeiling;
        }

        function formatFreqLabel(freq) {
            if (freq >= 1000) {
                let kVal = freq / 1000;
                return Number.isInteger(kVal) ? kVal + 'k' : kVal.toFixed(2).replace(/0+$/, '').replace(/\.$/, '') + 'k';
            }
            return Math.round(freq);
        }
        
        function updateOSD() {
            const isScope = viewMode === 'oscilloscope';
            const isLiss = viewMode === 'lissajous';

            document.getElementById('osd-mode').textContent = `MODE: ${viewMode.toUpperCase()}`;

            const visualCeiling = 1.0 / vertScaleMultiplier;
            const currentGain = gainNode ? gainNode.gain.value : 1.0;
            const trueVPerDiv = (visualCeiling * 2 / 8) / currentGain; 

            document.getElementById('osd-ch-combined').style.display = channels.combined.active ? 'block' : 'none';
            document.getElementById('osd-ch-combined').textContent = `CH L+R: ${trueVPerDiv.toFixed(2)} V/DIV`;

            document.getElementById('osd-ch-left').style.display = channels.left.active ? 'block' : 'none';
            document.getElementById('osd-ch-left').textContent = `CH L: ${trueVPerDiv.toFixed(2)} V/DIV`;

            document.getElementById('osd-ch-right').style.display = channels.right.active ? 'block' : 'none';
            document.getElementById('osd-ch-right').textContent = `CH R: ${trueVPerDiv.toFixed(2)} V/DIV`;

            if (isScope || isLiss) {
                const timePerDiv = scopeTimeWindowMs / 10; 
                document.getElementById('osd-timebase').textContent = `M: ${timePerDiv.toFixed(1)} ms/DIV`;
                document.getElementById('osd-memory').textContent = `POS: ${scopeOffsetXMs.toFixed(1)} ms`;

                document.getElementById('osd-freq-span').style.display = 'none';
                document.getElementById('osd-db-span').style.display = 'none';
                document.getElementById('osd-timebase').style.display = 'block';
                document.getElementById('osd-memory').style.display = 'block';
            } else {
                document.getElementById('osd-freq-span').textContent = `SPAN: ${formatFreqLabel(zoomMinFreq)} - ${formatFreqLabel(zoomMaxFreq)}`;
                const dbPerDiv = (displayMaxDb - displayMinDb) / 8;
                document.getElementById('osd-db-span').textContent = `REF: ${displayMaxDb}dB | SCALE: ${dbPerDiv.toFixed(1)}dB/DIV`;

                document.getElementById('osd-freq-span').style.display = 'block';
                document.getElementById('osd-db-span').style.display = 'block';
                document.getElementById('osd-timebase').style.display = 'none';
                document.getElementById('osd-memory').style.display = 'none';
            }

            if (scopeTriggerSource && isScope) {
                document.getElementById('osd-trigger').textContent = `TRIG: ${channels[scopeTriggerSource].name} @ ${scopeTriggerLevel.toFixed(2)}V`;
                document.getElementById('osd-trigger').style.color = channels[scopeTriggerSource].color;
            } else {
                document.getElementById('osd-trigger').textContent = `TRIG: AUTO`;
                document.getElementById('osd-trigger').style.color = '#d4d4d4';
            }
        }

        // ==========================================
        // 4. UNIVERSAL GRATICULE RENDERING
        // ==========================================
        function drawHardwareGraticule(ctx, cvs) {
            if (!cvs || cvs.width <= 0 || cvs.height <= 0) return;

            const p = getPadding();
            const w = cvs.width;
            const h = cvs.height - p.bottom;
            const hDivs = 10; 
            const vDivs = 8;  

            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle'; 
            ctx.font = '10px monospace';

            for (let i = 0; i <= hDivs; i++) {
                const px = p.left + (i * (w - p.left) / hDivs);

                if (i === 0 || i === hDivs || i === hDivs / 2) {
                    ctx.strokeStyle = '#666666'; ctx.setLineDash([]);
                } else {
                    ctx.strokeStyle = '#383838'; ctx.setLineDash([2, 4]);
                }
                ctx.beginPath(); ctx.moveTo(px, 0); ctx.lineTo(px, h); ctx.stroke();

                ctx.setLineDash([]);
                ctx.fillStyle = '#171717';
                ctx.fillRect(px - 15, h + 2, 30, 14);
                ctx.fillStyle = '#d4d4d4';

                let label = "";
                if (viewMode === 'oscilloscope') {
                    const ms = (scopeTimeWindowMs / hDivs) * i + scopeOffsetXMs;
                    label = ms.toFixed(1) + 'ms';
                } else if (viewMode === 'spectrum' || viewMode === 'waterfall' || viewMode === 'both') {
                    if (isLogScale) {
                        const logMin = Math.log10(Math.max(1, zoomMinFreq));
                        const logMax = Math.log10(Math.max(2, zoomMaxFreq));
                        const freq = Math.pow(10, logMin + (i / hDivs) * (logMax - logMin));
                        label = formatFreqLabel(freq);
                    } else {
                        const freq = zoomMinFreq + (i / hDivs) * (zoomMaxFreq - zoomMinFreq);
                        label = formatFreqLabel(freq);
                    }
                }
                
                if (label !== "" && label !== undefined) {
                    ctx.fillText(label.toString(), px, h + 9);
                }
            }

            ctx.textAlign = 'right';
            for (let i = 0; i <= vDivs; i++) {
                const py = i * (h / vDivs);

                if (i === 0 || i === vDivs || i === vDivs / 2) {
                    ctx.strokeStyle = '#666666'; ctx.setLineDash([]);
                } else {
                    ctx.strokeStyle = '#383838'; ctx.setLineDash([2, 4]);
                }
                ctx.beginPath(); ctx.moveTo(p.left, py); ctx.lineTo(w, py); ctx.stroke();

                ctx.setLineDash([]);
                ctx.fillStyle = '#171717';
                ctx.fillRect(5, py - 6, p.left - 10, 12);
                ctx.fillStyle = '#d4d4d4';

                let label = "";
                if (viewMode === 'oscilloscope' || viewMode === 'lissajous') {
                    const visualCeiling = 1.0 / vertScaleMultiplier;
                    const amp = visualCeiling - (i * (2 * visualCeiling) / vDivs);
                    const currentGain = gainNode ? gainNode.gain.value : 1.0;
                    const trueVoltage = amp / currentGain;
                    label = trueVoltage > 0 ? '+' + trueVoltage.toFixed(2) : trueVoltage.toFixed(2);
                } else if (viewMode === 'spectrum' || viewMode === 'waterfall' || viewMode === 'both') {
                    const db = displayMaxDb - (i * (displayMaxDb - displayMinDb) / vDivs);
                    label = Math.round(db) + ' dB';
                }

                if (label !== "" && label !== undefined) {
                    ctx.fillText(label.toString(), p.left - 8, py);
                }
            }
            ctx.textBaseline = 'alphabetic'; 

            if (viewMode === 'oscilloscope' && scopeTriggerSource !== null && channels[scopeTriggerSource]) {
                const trigColor = channels[scopeTriggerSource].color;
                const trigY = getScopeYPosition(scopeTriggerLevel, cvs.height);
                ctx.save(); 
                ctx.strokeStyle = trigColor; 
                ctx.setLineDash([4, 4]);
                ctx.beginPath(); 
                ctx.moveTo(p.left, trigY); 
                ctx.lineTo(w, trigY); 
                ctx.stroke(); 
                
                ctx.fillStyle = trigColor; 
                ctx.textAlign = 'left'; 
                ctx.textBaseline = 'middle';
                ctx.fillText('TRIG', p.left + 5, trigY - 6);
                ctx.restore(); 
            }
            
            if (viewMode === 'lissajous') {
                const centerX = p.left + (w - p.left) / 2;
                ctx.fillStyle = '#a3a3a3'; ctx.textAlign = 'center'; ctx.fillText('- L +', centerX, h + 20);
                ctx.textAlign = 'right'; ctx.textBaseline = 'middle'; ctx.fillText('+R', p.left - 5, 10); ctx.fillText('-R', p.left - 5, h - 10);
            }
        }

        // ==========================================
        // 5. AUDIO INITIALIZATION
        // ==========================================
        async function initAudio(sourceType) {
            if (!navigator.mediaDevices) {
                showToast("ERROR: MediaDevices API not supported. Requires HTTPS or Localhost context.", true);
                return;
            }

            showToast("INITIALIZING AUDIO ENGINE", false);
            statusEl.textContent = "INITIALIZING";
            statusEl.className = "text-yellow-500 font-mono bg-neutral-900 px-1 border border-neutral-700";

            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') await audioCtx.resume();

            try {
                if (sourceType === 'mic') {
                    if (!navigator.mediaDevices.getUserMedia) throw new Error("Microphone API not supported in this browser.");
                    stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                } else {
                    if (!navigator.mediaDevices.getDisplayMedia) {
                        throw new Error("System Audio capture is restricted. You are likely on a mobile device or a local file:// protocol.");
                    }
                    showToast("SYSTEM AUDIO: Select 'Entire Screen' and enable 'Share system audio'.", false);
                    stream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
                    
                    const audioTracks = stream.getAudioTracks();
                    if (!audioTracks.length) throw new Error("No audio track detected. You must explicitly check 'Share audio' in the system prompt.");
                }

                if (audioCtx.state === 'suspended') await audioCtx.resume();
                
                actualNyquist = audioCtx.sampleRate / 2;
                if (zoomMaxFreq > actualNyquist) zoomMaxFreq = actualNyquist;

                dummyAudioEl = new Audio(); dummyAudioEl.srcObject = stream; dummyAudioEl.muted = true; dummyAudioEl.play().catch(e => console.warn(e));
                
                channels.combined.analyser = audioCtx.createAnalyser(); 
                channels.left.analyser = audioCtx.createAnalyser(); 
                channels.right.analyser = audioCtx.createAnalyser();
                
                let splitter = audioCtx.createChannelSplitter(2);
                gainNode = audioCtx.createGain(); gainNode.gain.value = parseFloat(controls.gain.el.value);

                source = audioCtx.createMediaStreamSource(stream); source.connect(gainNode);
                gainNode.connect(channels.combined.analyser); gainNode.connect(splitter);
                splitter.connect(channels.left.analyser, 0); splitter.connect(channels.right.analyser, 1); 

                applyFftSize(); 

                deepMemLength = audioCtx.sampleRate * DEEP_MEM_SECONDS;
                deepMemL = new Float32Array(deepMemLength);
                deepMemR = new Float32Array(deepMemLength);
                deepMemC = new Float32Array(deepMemLength);
                deepMemPtr = 0;

                if (memNode) memNode.disconnect();
                memNode = audioCtx.createScriptProcessor(4096, 2, 2);
                memNode.onaudioprocess = (e) => {
                    if (isFrozen) return;
                    let inL = e.inputBuffer.getChannelData(0);
                    let inR = e.inputBuffer.getChannelData(1);
                    for(let i = 0; i < inL.length; i++) {
                        deepMemL[deepMemPtr] = inL[i];
                        deepMemR[deepMemPtr] = inR[i] !== undefined ? inR[i] : inL[i];
                        deepMemC[deepMemPtr] = (deepMemL[deepMemPtr] + deepMemR[deepMemPtr]) / 2.0;
                        deepMemPtr = (deepMemPtr + 1) % deepMemLength;
                    }
                };

                if (dummySink) dummySink.disconnect();
                dummySink = audioCtx.createGain();
                dummySink.gain.value = 0;
                gainNode.connect(memNode);
                memNode.connect(dummySink);
                dummySink.connect(audioCtx.destination);

                document.getElementById('btn-mic').classList.add('hidden');
                document.getElementById('btn-system').classList.add('hidden');
                document.getElementById('btn-stop').classList.remove('hidden');
                
                statusEl.textContent = `LIVE (${sourceType.toUpperCase()})`; statusEl.className = "text-green-500 font-mono bg-neutral-900 px-1 border border-neutral-700";
                stream.getTracks().forEach(t => t.onended = () => stopAudio());
                
                updateOSD();
            } catch (err) {
                showToast("ERROR: " + err.message, true); 
                stopAudio();
            }
        }

        function stopAudio() {
            if (stream) stream.getTracks().forEach(t => t.stop());
            if (dummyAudioEl) { dummyAudioEl.srcObject = null; dummyAudioEl = null; }
            if (memNode) { memNode.disconnect(); memNode = null; }
            if (dummySink) { dummySink.disconnect(); dummySink = null; }
            document.getElementById('btn-mic').classList.remove('hidden');
            document.getElementById('btn-system').classList.remove('hidden');
            document.getElementById('btn-stop').classList.add('hidden');
            statusEl.textContent = "READY"; statusEl.className = "text-yellow-500 font-mono bg-neutral-900 px-1 border border-neutral-700";
        }

        // ==========================================
        // 6. MAIN MULTIPLEX RENDERING LOOP
        // ==========================================
        function drawVisualizer(timestamp) {
            animationId = requestAnimationFrame(drawVisualizer);

            if (lastDrawTime && !isFrozen) {
                const dt = timestamp - lastDrawTime;
                if (dt > 0 && dt < 150) { msPerRowAverage = (msPerRowAverage * 0.9) + (dt * 0.1); }
            }
            lastDrawTime = timestamp;

            const visCtx = mainDisplay.visCvs.getContext('2d');
            const wfCtx = mainDisplay.wfCvs.getContext('2d');
            
            visCtx.clearRect(0, 0, mainDisplay.visCvs.width, mainDisplay.visCvs.height);

            if ((viewMode === 'waterfall' || viewMode === 'both') && channels.combined.analyser) {
                document.querySelectorAll('.ms-row-badge').forEach(el => {
                    el.style.display = 'block';
                    el.querySelector('.val').textContent = msPerRowAverage.toFixed(2);
                });
            } else {
                document.querySelectorAll('.ms-row-badge').forEach(el => el.style.display = 'none');
            }

            if (!isFrozen) {
                if (viewMode === 'oscilloscope' || viewMode === 'lissajous') {
                    const flatten = (src) => {
                        let flat = new Float32Array(deepMemLength);
                        flat.set(src.subarray(deepMemPtr), 0);
                        flat.set(src.subarray(0, deepMemPtr), deepMemLength - deepMemPtr);
                        return flat;
                    };
                    channels.left.timeData = flatten(deepMemL);
                    channels.right.timeData = flatten(deepMemR);
                    channels.combined.timeData = flatten(deepMemC);
                }
                
                if (viewMode !== 'oscilloscope' && viewMode !== 'lissajous') {
                    Object.values(channels).forEach(ch => {
                        if (ch.analyser) {
                            const bufferLength = ch.analyser.frequencyBinCount;
                            if (!ch.rawData || ch.rawData.length !== bufferLength) ch.rawData = new Float32Array(bufferLength);
                            ch.analyser.getFloatFrequencyData(ch.rawData);

                            if (!ch.data || ch.data.length !== bufferLength) {
                                ch.data = new Float32Array(ch.rawData);
                                for(let i = 0; i < bufferLength; i++) { if (!isFinite(ch.data[i])) ch.data[i] = -200; }
                            } else {
                                for (let i = 0; i < bufferLength; i++) {
                                    let oldVal = isFinite(ch.data[i]) ? ch.data[i] : -200;
                                    let newVal = isFinite(ch.rawData[i]) ? ch.rawData[i] : -200;
                                    ch.data[i] = (averagingAlpha * oldVal) + ((1 - averagingAlpha) * newVal);
                                }
                            }
                        }
                    });
                }
            }

            if (viewMode === 'lissajous') {
                drawHardwareGraticule(visCtx, mainDisplay.visCvs);
                const visualCeiling = 1.0 / vertScaleMultiplier;
                if (channels.left.timeData && channels.right.timeData) {
                    drawLissajous(visCtx, mainDisplay.visCvs, channels.left.timeData, channels.right.timeData, visualCeiling, '#ef4444'); 
                }
                if (isMemOverlay && memorySnapshot && memorySnapshot.channels['left'] && memorySnapshot.channels['right']) {
                    drawLissajous(visCtx, mainDisplay.visCvs, memorySnapshot.channels['left'].timeData, memorySnapshot.channels['right'].timeData, visualCeiling, '#f87171', 2.5);
                }
                updateCursorReadouts();
                return;
            }

            if (viewMode === 'oscilloscope') {
                drawHardwareGraticule(visCtx, mainDisplay.visCvs);
                
                let triggerFound = false;
                const visualCeiling = 1.0 / vertScaleMultiplier;
                const sampleRate = actualNyquist * 2; 
                const samplesToDraw = Math.floor((scopeTimeWindowMs / 1000) * sampleRate);
                
                if (!isFrozen && scopeTriggerSource !== null && channels[scopeTriggerSource] && channels[scopeTriggerSource].timeData) {
                    let searchData = channels[scopeTriggerSource].timeData;
                    
                    lastTriggerIndex = Math.max(0, searchData.length - samplesToDraw);
                    const hysteresis = visualCeiling * 0.05;
                    let armedForEdge = false;

                    for (let i = lastTriggerIndex; i > 0; i--) {
                        if (searchData[i] > scopeTriggerLevel + hysteresis) { armedForEdge = true; }
                        if (armedForEdge && searchData[i-1] <= scopeTriggerLevel) {
                            lastTriggerIndex = i; triggerFound = true; break;
                        }
                    }
                } else if (!isFrozen) {
                    const activeData = channels.combined.active ? channels.combined.timeData : (channels.left.active ? channels.left.timeData : channels.right.timeData);
                    const bufferSize = activeData ? activeData.length : deepMemLength;
                    lastTriggerIndex = Math.max(0, bufferSize - samplesToDraw);
                }

                if (isOneShotArmed && !isFrozen && triggerFound) {
                    isOneShotArmed = false; isFrozen = true;
                    document.getElementById('btn-freeze').textContent = "FREEZE: ON"; 
                    document.getElementById('btn-freeze').classList.replace('bg-neutral-800', 'bg-blue-800');
                    const btnOs = document.getElementById('btn-trig-oneshot');
                    btnOs.textContent = "1-SHOT: CAUGHT"; btnOs.className = "flex-1 py-1 bg-green-800 border border-green-600 text-[9px] font-bold text-white";
                } 

                Object.keys(channels).forEach(key => {
                    const ch = channels[key];
                    if (!ch.active) return;
                    if (ch.timeData) drawOscilloscope(visCtx, mainDisplay.visCvs, ch.timeData, lastTriggerIndex, ch.color, ch.offsetY, 1.5);
                    if (isMemOverlay && memorySnapshot && memorySnapshot.channels[key] && memorySnapshot.channels[key].timeData) {
                        drawOscilloscope(visCtx, mainDisplay.visCvs, memorySnapshot.channels[key].timeData, 0, '#ef4444', ch.offsetY, 2.5);
                    }
                });

                drawMeasurementTools(visCtx, mainDisplay.visCvs, null);
                updateCursorReadouts();
                return;
            }

            if (viewMode === 'waterfall' || viewMode === 'both') {
                wfCtx.drawImage(mainDisplay.wfCvs, 0, 1);
                let primaryData = null;
                if (channels.combined.active && channels.combined.data) primaryData = channels.combined.data;
                else if (channels.left.active && channels.left.data) primaryData = channels.left.data;
                else if (channels.right.active && channels.right.data) primaryData = channels.right.data;
                
                if (primaryData) drawWaterfallRow(wfCtx, mainDisplay.wfCvs, primaryData);
            } 
            
            drawHardwareGraticule(visCtx, mainDisplay.visCvs);

            if (viewMode === 'spectrum' || viewMode === 'both') {
                Object.keys(channels).forEach(key => {
                    const ch = channels[key];
                    if (!ch.active || !ch.data) return;
                    drawTrace(visCtx, mainDisplay.visCvs, ch.data, ch.color, ch.fill, ch.offsetY, 1.5);
                    if (isMemOverlay && memorySnapshot && memorySnapshot.channels[key] && memorySnapshot.channels[key].data) {
                        drawTrace(visCtx, mainDisplay.visCvs, memorySnapshot.channels[key].data, '#ef4444', false, ch.offsetY, 2.5);
                    }
                });
            }

            let activeChannelForMeas = channels.combined.active ? channels.combined : (channels.left.active ? channels.left : channels.right);
            drawMeasurementTools(visCtx, mainDisplay.visCvs, activeChannelForMeas);
            updateCursorReadouts();
        }

        function drawTrace(ctx, cvs, data, strokeColor, fillStyle, offsetY = 0, lineWidth = 1.5) {
            const bufferLength = data.length; const binSize = actualNyquist / bufferLength; const p = getPadding();
            ctx.lineWidth = lineWidth; ctx.strokeStyle = strokeColor; ctx.beginPath();
            let hasMoved = false; const startB = Math.max(0, Math.floor(zoomMinFreq / binSize)); const endB = Math.min(bufferLength, Math.ceil(zoomMaxFreq / binSize));
            for (let i = startB; i < endB; i++) {
                const x = getXPosition(i * binSize, cvs.width); 
                const val = Math.max(displayMinDb, Math.min(displayMaxDb, data[i])); 
                const y = getYPosition(val, cvs.height) + offsetY; 
                if (!hasMoved) { ctx.moveTo(x, y); hasMoved = true; } else ctx.lineTo(x, y);
            }
            ctx.stroke();
            if (fillStyle) {
                ctx.lineTo(getXPosition(endB * binSize, cvs.width), cvs.height - p.bottom); ctx.lineTo(p.left, cvs.height - p.bottom);
                ctx.fillStyle = fillStyle; ctx.fill();
            }
        }

        function drawOscilloscope(ctx, cvs, timeData, triggerIndex, strokeColor, offsetY = 0, lineWidth = 1.5) {
            const sampleRate = actualNyquist * 2; 
            const visualCeiling = 1.0 / vertScaleMultiplier;
            const startSampleOffset = Math.floor((scopeOffsetXMs / 1000) * sampleRate);
            const actualStartIndex = triggerIndex + startSampleOffset;
            
            const samplesToDraw = Math.floor((scopeTimeWindowMs / 1000) * sampleRate);
            
            ctx.lineWidth = lineWidth; ctx.strokeStyle = strokeColor; ctx.beginPath(); let hasMoved = false;
            
            for (let i = 0; i < samplesToDraw; i++) {
                const dataIndex = actualStartIndex + i;
                if (dataIndex < 0 || dataIndex >= timeData.length) continue;
                
                const timeMs = (i / sampleRate) * 1000; 
                const canvasX = getScopeXPosition(timeMs, cvs.width);
                const val = Math.max(-visualCeiling, Math.min(visualCeiling, timeData[dataIndex])); 
                const canvasY = getScopeYPosition(val, cvs.height) + offsetY; 
                
                if (!hasMoved) { ctx.moveTo(canvasX, canvasY); hasMoved = true; } 
                else ctx.lineTo(canvasX, canvasY);
            }
            ctx.stroke();
        }
        
        function drawLissajous(ctx, cvs, leftData, rightData, maxAmp, strokeColor, lineWidth = 1.5) {
            if (!leftData || !rightData) return; const p = getPadding(); const w = cvs.width - p.left; const h = cvs.height - p.bottom;
            const centerX = p.left + w / 2; const centerY = h / 2; const scaleX = (w / 2) / maxAmp; const scaleY = (h / 2) / maxAmp;
            ctx.lineWidth = lineWidth; ctx.strokeStyle = strokeColor; ctx.beginPath(); let hasMoved = false; const len = Math.min(leftData.length, rightData.length);
            for (let i = 0; i < len; i++) {
                let valL = Math.max(-maxAmp, Math.min(maxAmp, leftData[i])); let valR = Math.max(-maxAmp, Math.min(maxAmp, rightData[i]));
                let x = centerX + (valL * scaleX); let y = centerY - (valR * scaleY);
                if (!hasMoved) { ctx.moveTo(x, y); hasMoved = true; } else ctx.lineTo(x, y);
            }
            ctx.stroke();
        }

        function drawWaterfallRow(wfCtx, cvs, data) {
            const p = getPadding(); const w = cvs.width - p.left; if (w <= 0) return;
            const imgData = wfCtx.createImageData(w, 1); const buf = imgData.data; const binSize = actualNyquist / data.length;
            for (let x = 0; x < w; x++) {
                let normalizedX = x / w;
                let freq = isLogScale ? Math.pow(10, normalizedX * (Math.log10(Math.max(1, zoomMaxFreq)) - Math.log10(Math.max(1, zoomMinFreq))) + Math.log10(Math.max(1, zoomMinFreq)))
                                      : normalizedX * (zoomMaxFreq - zoomMinFreq) + zoomMinFreq;
                let exactBin = freq / binSize; let bin1 = Math.floor(exactBin); let bin2 = Math.min(data.length - 1, Math.ceil(exactBin)); let frac = exactBin - bin1;
                let val = (data[bin1] || -140) * (1 - frac) + (data[bin2] || -140) * frac;
                let t = (val - displayMinDb) / (displayMaxDb - displayMinDb); t = Math.max(0, Math.min(1, t)); let cIdx = Math.floor(t * 255) * 4;
                let pxIdx = x * 4; buf[pxIdx] = colormap[cIdx]; buf[pxIdx+1] = colormap[cIdx+1]; buf[pxIdx+2] = colormap[cIdx+2]; buf[pxIdx+3] = 255;
            }
            wfCtx.putImageData(imgData, p.left, 0); 
        }

        function drawHighContrastLine(ctx, x1, y1, x2, y2, color, isDashed = true) {
            ctx.save(); ctx.setLineDash(isDashed ? [5, 5] : []); ctx.strokeStyle = 'rgba(0, 0, 0, 0.85)'; ctx.lineWidth = 3;
            ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
            ctx.strokeStyle = color; ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
            ctx.restore();
        }

        function drawMeasurementTools(ctx, cvs, channelInfo) {
            const p = getPadding();
            const gH = cvs.height - p.bottom;

            if (viewMode === 'oscilloscope') {
                if (cursorsXEnabled) {
                    [scopeCursorX1Ms, scopeCursorX2Ms].forEach(ms => {
                        const x = getScopeXPosition(ms, cvs.width); drawHighContrastLine(ctx, x, 0, x, gH, '#4ade80', true);
                    });
                }
                if (cursorsYEnabled) {
                    [scopeCursorY1Amp, scopeCursorY2Amp].forEach(amp => {
                        const y = getScopeYPosition(amp, cvs.height); drawHighContrastLine(ctx, p.left, y, cvs.width, y, '#c084fc', true);
                    });
                }
                return;
            }

            if (viewMode === 'lissajous') return; 

            if (showPeaks && viewMode !== 'waterfall' && channelInfo && channelInfo.data) {
                const data = channelInfo.data;
                const offsetY = channelInfo.offsetY || 0;
                const bufferLength = data.length; const binSize = actualNyquist / bufferLength; let localPeaks = [];
                const startB = Math.max(0, Math.floor(zoomMinFreq / binSize)); const endB = Math.min(bufferLength, Math.ceil(zoomMaxFreq / binSize));
                for (let i = startB + 1; i < endB - 1; i++) {
                    if (data[i] > data[i-1] && data[i] > data[i+1] && data[i] > -115) localPeaks.push({ i, db: data[i], freq: i * binSize });
                }
                localPeaks.sort((a,b) => b.db - a.db); let distinctPeaks = []; const minFreqSep = Math.max(50, (zoomMaxFreq - zoomMinFreq) * 0.02);
                for (const peak of localPeaks) {
                    if (distinctPeaks.length >= 3) break; let tooClose = false;
                    for (const dp of distinctPeaks) { if (Math.abs(peak.freq - dp.freq) < minFreqSep) { tooClose = true; break; } }
                    if (!tooClose) distinctPeaks.push(peak);
                }
                distinctPeaks.forEach((peak, idx) => {
                    const x = getXPosition(peak.freq, cvs.width);
                    const y = getYPosition(peak.db, cvs.height) + offsetY; 
                    
                    ctx.strokeStyle = 'rgba(0,0,0,0.85)'; ctx.lineWidth = 3; ctx.beginPath(); ctx.arc(x, y, 6, 0, Math.PI*2); ctx.stroke();
                    ctx.strokeStyle = '#f472b6'; ctx.lineWidth = 1.5; ctx.beginPath(); ctx.arc(x, y, 6, 0, Math.PI*2); ctx.stroke();
                    ctx.font = '10px monospace'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
                    const text = `P${idx+1}:${formatFreqLabel(peak.freq)}`; const textWidth = ctx.measureText(text).width; const textY = y - 10 - (idx * 14); 
                    ctx.fillStyle = 'rgba(2, 6, 23, 0.85)'; ctx.fillRect(x + 8, textY - 6, textWidth + 4, 12);
                    ctx.fillStyle = '#f472b6'; ctx.fillText(text, x + 10, textY);
                });
            }

            if (cursorsXEnabled) {
                [cursorX1Freq, cursorX2Freq].forEach(f => {
                    const x = getXPosition(f, cvs.width); drawHighContrastLine(ctx, x, 0, x, gH, '#4ade80', true);
                });
            }
            
            if (cursorsYEnabled) {
                if (viewMode === 'waterfall') {
                    drawHighContrastLine(ctx, p.left, wfCursorY1Px, cvs.width, wfCursorY1Px, '#c084fc', true);
                    drawHighContrastLine(ctx, p.left, wfCursorY2Px, cvs.width, wfCursorY2Px, '#c084fc', true);
                } else if (viewMode === 'spectrum' || viewMode === 'both') {
                    [cursorY1Db, cursorY2Db].forEach(db => {
                        const y = getYPosition(db, cvs.height); drawHighContrastLine(ctx, p.left, y, cvs.width, y, '#c084fc', true);
                    });
                }
            }
        }

        function handlePointerDown(e, cvs) {
            if (e.touches && e.touches.length === 2) {
                const touch1 = e.touches[0];
                const touch2 = e.touches[1];
                
                const dx = Math.abs(touch2.clientX - touch1.clientX);
                const dy = Math.abs(touch2.clientY - touch1.clientY);
                
                pinchAxis = dx > dy ? 'x' : 'y';
                initialPinchDistX = dx;
                initialPinchDistY = dy;

                initialTimebase = scopeTimeWindowMs;
                initialVertScale = vertScaleMultiplier;
                initialPinchMinFreq = zoomMinFreq;
                initialPinchMaxFreq = zoomMaxFreq;
                initialPinchMinDb = displayMinDb;
                initialPinchMaxDb = displayMaxDb;
                
                activeDrag = { id: 'pinch' };
                return; 
            }

            const rect = cvs.getBoundingClientRect(); 
            const clientX = e.touches && e.touches.length > 0 ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches && e.touches.length > 0 ? e.touches[0].clientY : e.clientY;
            const x = clientX - rect.left; 
            const y = clientY - rect.top;
            
            activeDrag = null; 
            const hitTest = 25; 
            
            if (viewMode === 'oscilloscope') {
                if (scopeTriggerSource !== null) {
                    if (Math.abs(y - getScopeYPosition(scopeTriggerLevel, cvs.height)) < hitTest) {
                        activeDrag = { id: 'trig', cvs };
                    }
                }
                if (!activeDrag && cursorsXEnabled) {
                    if (Math.abs(x - getScopeXPosition(scopeCursorX1Ms, cvs.width)) < hitTest) activeDrag = { id: 'x1s', cvs };
                    else if (Math.abs(x - getScopeXPosition(scopeCursorX2Ms, cvs.width)) < hitTest) activeDrag = { id: 'x2s', cvs };
                }
                if (!activeDrag && cursorsYEnabled) {
                    if (Math.abs(y - getScopeYPosition(scopeCursorY1Amp, cvs.height)) < hitTest) activeDrag = { id: 'y1s', cvs };
                    else if (Math.abs(y - getScopeYPosition(scopeCursorY2Amp, cvs.height)) < hitTest) activeDrag = { id: 'y2s', cvs };
                }
            } else if (viewMode === 'waterfall') {
                if (cursorsXEnabled) {
                    if (Math.abs(x - getXPosition(cursorX1Freq, cvs.width)) < hitTest) activeDrag = { id: 'x1', cvs };
                    else if (Math.abs(x - getXPosition(cursorX2Freq, cvs.width)) < hitTest) activeDrag = { id: 'x2', cvs };
                }
                if (!activeDrag && cursorsYEnabled) {
                    if (Math.abs(y - wfCursorY1Px) < hitTest) activeDrag = { id: 'wf_y1', cvs };
                    else if (Math.abs(y - wfCursorY2Px) < hitTest) activeDrag = { id: 'wf_y2', cvs };
                }
            } else if (viewMode === 'spectrum' || viewMode === 'both') {
                if (cursorsXEnabled) {
                    if (Math.abs(x - getXPosition(cursorX1Freq, cvs.width)) < hitTest) activeDrag = { id: 'x1', cvs };
                    else if (Math.abs(x - getXPosition(cursorX2Freq, cvs.width)) < hitTest) activeDrag = { id: 'x2', cvs };
                }
                if (!activeDrag && cursorsYEnabled) {
                    if (Math.abs(y - getYPosition(cursorY1Db, cvs.height)) < hitTest) activeDrag = { id: 'y1', cvs };
                    else if (Math.abs(y - getYPosition(cursorY2Db, cvs.height)) < hitTest) activeDrag = { id: 'y2', cvs };
                }
            }

            if (!activeDrag && viewMode !== 'lissajous') {
                let closestDist = 30; 
                let selectedTrace = null;
                
                Object.keys(channels).forEach(key => {
                    const ch = channels[key];
                    if (!ch.active) return;
                    
                    let traceY = null;
                    if ((viewMode === 'spectrum' || viewMode === 'both') && ch.data) {
                        const binSize = actualNyquist / ch.data.length;
                        const freq = getFreqFromX(x, cvs.width);
                        const bin = Math.max(0, Math.min(ch.data.length - 1, Math.round(freq / binSize)));
                        const val = Math.max(displayMinDb, Math.min(displayMaxDb, ch.data[bin]));
                        traceY = getYPosition(val, cvs.height) + ch.offsetY;
                    } else if (viewMode === 'oscilloscope' && ch.timeData) {
                        const ms = getMsFromScopeX(x, cvs.width) + scopeOffsetXMs;
                        const sampleRate = actualNyquist * 2;
                        const index = lastTriggerIndex + Math.floor((ms / 1000) * sampleRate);
                        if (index >= 0 && index < ch.timeData.length) {
                            const visualCeiling = 1.0 / vertScaleMultiplier;
                            const val = Math.max(-visualCeiling, Math.min(visualCeiling, ch.timeData[index]));
                            traceY = getScopeYPosition(val, cvs.height) + ch.offsetY;
                        }
                    }
                    
                    if (traceY !== null) {
                        const dist = Math.abs(y - traceY);
                        if (dist < closestDist) {
                            closestDist = dist;
                            selectedTrace = key;
                        }
                    }
                });
                
                activeDrag = { 
                    id: 'pan', 
                    key: selectedTrace, 
                    startX: x,
                    startY: y, 
                    startOffsetY: selectedTrace ? channels[selectedTrace].offsetY : 0,
                    startOffsetX: scopeOffsetXMs,
                    startMinFreq: zoomMinFreq,
                    startMaxFreq: zoomMaxFreq,
                    startMinDb: displayMinDb,
                    startMaxDb: displayMaxDb,
                    panAxis: null
                };
                cvs.style.cursor = 'grabbing';
            }
        }

        function handlePointerMove(e) {
            if (!activeDrag) return; 

            if (activeDrag.id === 'pinch' && e.touches && e.touches.length === 2) {
                if (e.cancelable) e.preventDefault(); 
                
                const touch1 = e.touches[0];
                const touch2 = e.touches[1];

                if (pinchAxis === 'x') {
                    const currentDistX = Math.abs(touch1.clientX - touch2.clientX);
                    if (initialPinchDistX > 0 && currentDistX > 0) {
                        const ratio = initialPinchDistX / currentDistX;
                        
                        if (viewMode === 'oscilloscope') {
                            let newTimebase = initialTimebase * ratio;
                            newTimebase = Math.max(1, Math.min(5000, newTimebase));
                            scopeTimeWindowMs = newTimebase;
                        } else {
                            const span = initialPinchMaxFreq - initialPinchMinFreq;
                            const center = initialPinchMinFreq + span / 2;
                            let newSpan = span * ratio;
                            newSpan = Math.max(100, Math.min(24000, newSpan)); 
                            
                            zoomMinFreq = Math.max(0, Math.round(center - newSpan / 2));
                            zoomMaxFreq = Math.min(actualNyquist, Math.round(center + newSpan / 2));
                        }
                    }
                } else if (pinchAxis === 'y') {
                    const currentDistY = Math.abs(touch1.clientY - touch2.clientY);
                    if (initialPinchDistY > 0 && currentDistY > 0) {
                        const ratio = currentDistY / initialPinchDistY; 
                        
                        if (viewMode === 'oscilloscope') {
                            let newScale = initialVertScale * ratio;
                            newScale = Math.max(0.01, Math.min(100.0, newScale));
                            newScale = Math.round(newScale * 100) / 100;
                            
                            vertScaleMultiplier = newScale;
                        } else {
                            const invertRatio = initialPinchDistY / currentDistY; 
                            const span = initialPinchMaxDb - initialPinchMinDb;
                            const center = initialPinchMinDb + span / 2;
                            let newSpan = span * invertRatio;
                            newSpan = Math.max(10, Math.min(140, newSpan)); 
                            
                            displayMinDb = Math.max(-140, Math.round(center - newSpan / 2));
                            displayMaxDb = Math.min(0, Math.round(center + newSpan / 2));
                        }
                    }
                }
                
                clampCursors(); updateCursorReadouts(); updateOSD(); 
                return;
            }

            if (e.cancelable) e.preventDefault(); 
            const rect = (activeDrag.cvs || mainDisplay.visCvs).getBoundingClientRect(); 
            const clientX = e.touches && e.touches.length > 0 ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches && e.touches.length > 0 ? e.touches[0].clientY : e.clientY;
            const x = clientX - rect.left; 
            const y = clientY - rect.top;
            
            if (activeDrag.id === 'pan') {
                const dx = x - activeDrag.startX;
                const dy = y - activeDrag.startY;

                if (!activeDrag.panAxis && (Math.abs(dx) > 5 || Math.abs(dy) > 5)) {
                    activeDrag.panAxis = Math.abs(dx) > Math.abs(dy) ? 'x' : 'y';
                }

                if (activeDrag.panAxis === 'y') {
                    if (activeDrag.key) {
                        channels[activeDrag.key].offsetY = activeDrag.startOffsetY + dy;
                    } else if (viewMode !== 'oscilloscope') {
                        const dbSpan = activeDrag.startMaxDb - activeDrag.startMinDb;
                        const deltaDb = (dy / rect.height) * dbSpan;
                        let newMin = activeDrag.startMinDb + deltaDb;
                        let newMax = activeDrag.startMaxDb + deltaDb;

                        if (newMax > 0) { newMin -= newMax; newMax = 0; }
                        if (newMin < -140) { newMax += Math.abs(newMin + 140); newMin = -140; if (newMax > 0) newMax = 0; }
                        
                        displayMinDb = Math.round(newMin);
                        displayMaxDb = Math.round(newMax);
                    }
                } else if (activeDrag.panAxis === 'x') {
                    if (viewMode === 'oscilloscope') {
                        const deltaXMs = (dx / rect.width) * scopeTimeWindowMs;
                        let targetOffset = activeDrag.startOffsetX - deltaXMs;
                        
                        const sampleRate = actualNyquist * 2;
                        const minOffsetMs = -(lastTriggerIndex / sampleRate) * 1000;
                        const maxOffsetMs = ((deepMemLength - lastTriggerIndex) / sampleRate) * 1000 - scopeTimeWindowMs;
                        
                        scopeOffsetXMs = Math.max(minOffsetMs, Math.min(targetOffset, maxOffsetMs));
                    } else if (viewMode === 'spectrum' || viewMode === 'waterfall' || viewMode === 'both') {
                        const freqSpan = activeDrag.startMaxFreq - activeDrag.startMinFreq;
                        const deltaFreq = (dx / rect.width) * freqSpan;
                        let newMin = activeDrag.startMinFreq - deltaFreq;
                        let newMax = activeDrag.startMaxFreq - deltaFreq;

                        if (newMin < 0) { newMax += Math.abs(newMin); newMin = 0; }
                        if (newMax > actualNyquist) { newMin -= (newMax - actualNyquist); newMax = actualNyquist; if (newMin < 0) newMin = 0; }

                        zoomMinFreq = Math.round(newMin);
                        zoomMaxFreq = Math.round(newMax);
                    }
                }
                updateCursorReadouts(); updateOSD();
                return;
            }

            if (viewMode === 'oscilloscope') {
                if (activeDrag.id === 'trig') {
                    scopeTriggerLevel = getAmpFromScopeY(y, activeDrag.cvs.height);
                    scopeTriggerLevel = Math.max(-1, Math.min(1, scopeTriggerLevel)); 
                    updateOSD();
                }
                if (activeDrag.id === 'x1s') scopeCursorX1Ms = getMsFromScopeX(x, activeDrag.cvs.width);
                if (activeDrag.id === 'x2s') scopeCursorX2Ms = getMsFromScopeX(x, activeDrag.cvs.width);
                if (activeDrag.id === 'y1s') scopeCursorY1Amp = getAmpFromScopeY(y, activeDrag.cvs.height);
                if (activeDrag.id === 'y2s') scopeCursorY2Amp = getAmpFromScopeY(y, activeDrag.cvs.height);
            } else if (viewMode === 'waterfall') {
                if (activeDrag.id === 'x1') cursorX1Freq = getFreqFromX(x, activeDrag.cvs.width);
                if (activeDrag.id === 'x2') cursorX2Freq = getFreqFromX(x, activeDrag.cvs.width);
                if (activeDrag.id === 'wf_y1') wfCursorY1Px = y;
                if (activeDrag.id === 'wf_y2') wfCursorY2Px = y;
            } else {
                if (activeDrag.id === 'x1') cursorX1Freq = getFreqFromX(x, activeDrag.cvs.width);
                if (activeDrag.id === 'x2') cursorX2Freq = getFreqFromX(x, activeDrag.cvs.width);
                if (activeDrag.id === 'y1') cursorY1Db = getDbFromY(y, activeDrag.cvs.height);
                if (activeDrag.id === 'y2') cursorY2Db = getDbFromY(y, activeDrag.cvs.height);
            }
            clampCursors(); updateCursorReadouts();
        }

        function handlePointerUp() { 
            activeDrag = null; 
            pinchAxis = null;
            initialPinchDistX = 0;
            initialPinchDistY = 0;
            initialTimebase = null;
            initialVertScale = null;
        }

        // Single Event Source Pipeline
        mainDisplay.visCvs.addEventListener('mousedown', (e) => handlePointerDown(e, mainDisplay.visCvs)); 
        mainDisplay.visCvs.addEventListener('touchstart', (e) => handlePointerDown(e, mainDisplay.visCvs), { passive: false });
        
        mainDisplay.visCvs.addEventListener('dblclick', () => {
            Object.values(channels).forEach(ch => ch.offsetY = 0);
            scopeOffsetXMs = 0; 
            showToast("TRACE OFFSETS ZEROED", false);
            updateOSD();
        });

        // Hover axis cursor detection
        mainDisplay.visCvs.addEventListener('mousemove', (e) => {
            handlePointerMove(e);
            if (activeDrag || (e.touches && e.touches.length > 0)) return; 
            const rect = mainDisplay.visCvs.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const p = getPadding();
            
            if (x < p.left) {
                mainDisplay.visCvs.style.cursor = 'ns-resize'; 
            } else if (y > rect.height - p.bottom) {
                mainDisplay.visCvs.style.cursor = 'ew-resize'; 
            } else {
                mainDisplay.visCvs.style.cursor = 'crosshair'; 
            }
        });

        window.addEventListener('mouseup', handlePointerUp);
        window.addEventListener('touchmove', handlePointerMove, { passive: false }); 
        window.addEventListener('touchend', handlePointerUp);

        // Mouse Wheel Range Scaling
        mainDisplay.visCvs.addEventListener('wheel', (e) => {
            e.preventDefault(); 
            const rect = mainDisplay.visCvs.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const p = getPadding();
            const dir = Math.sign(e.deltaY);
            
            if (x < p.left) {
                if (viewMode === 'oscilloscope' || viewMode === 'lissajous') {
                    let newScale = vertScaleMultiplier * (dir > 0 ? 0.9 : 1.1); 
                    newScale = Math.max(0.01, Math.min(100.0, newScale));
                    vertScaleMultiplier = Math.round(newScale * 100) / 100;
                } else {
                    const span = displayMaxDb - displayMinDb;
                    const center = displayMinDb + span / 2;
                    let newSpan = span * (dir > 0 ? 1.1 : 0.9);
                    newSpan = Math.max(10, Math.min(140, newSpan));
                    displayMinDb = Math.max(-140, Math.round(center - newSpan / 2));
                    displayMaxDb = Math.min(0, Math.round(center + newSpan / 2));
                }
                clampCursors(); updateCursorReadouts(); updateOSD();
            } else if (y > rect.height - p.bottom) {
                if (viewMode === 'oscilloscope') {
                    let newTime = scopeTimeWindowMs * (dir > 0 ? 1.1 : 0.9); 
                    newTime = Math.max(1, Math.min(5000, newTime));
                    scopeTimeWindowMs = newTime;
                } else if (viewMode !== 'lissajous') {
                    const span = zoomMaxFreq - zoomMinFreq;
                    const center = zoomMinFreq + span / 2;
                    let newSpan = span * (dir > 0 ? 1.1 : 0.9);
                    newSpan = Math.max(100, Math.min(24000, newSpan));
                    zoomMinFreq = Math.max(0, Math.round(center - newSpan / 2));
                    zoomMaxFreq = Math.min(actualNyquist, Math.round(center + newSpan / 2));
                }
                clampCursors(); updateCursorReadouts(); updateOSD();
            }
        }, { passive: false });

        const resizeObserver = new ResizeObserver(entries => {
            for (let entry of entries) {
                const w = entry.contentRect.width; const h = entry.contentRect.height;
                if (w <= 0 || h <= 0) continue;

                mainDisplay.visCvs.width = w; mainDisplay.visCvs.height = h;
                
                let oldData; const wfCtx = mainDisplay.wfCvs.getContext('2d', { willReadFrequently: true });
                if (mainDisplay.wfCvs.width > 0 && mainDisplay.wfCvs.height > 0) {
                    try { oldData = wfCtx.getImageData(0, 0, mainDisplay.wfCvs.width, mainDisplay.wfCvs.height); } catch(e){}
                }
                mainDisplay.wfCvs.width = w; mainDisplay.wfCvs.height = h;
                
                if (viewMode === 'waterfall' || viewMode === 'both') {
                    wfCtx.fillStyle = '#171717'; wfCtx.fillRect(0,0,w,h); if (oldData) wfCtx.putImageData(oldData, 0, 0);
                } else {
                    wfCtx.fillStyle = '#171717'; wfCtx.fillRect(0,0,w,h);
                }
            }
        });
        resizeObserver.observe(mainDisplay.container);

        document.querySelectorAll('input[type="range"]').forEach(input => {
            const hitArea = input.closest('div[title="Scroll to adjust"]') || input.parentElement;
            hitArea.addEventListener('wheel', (e) => {
                e.preventDefault();
                const step = parseFloat(input.step) || 1; const min = parseFloat(input.min) || 0; const max = parseFloat(input.max) || 100;
                let val = parseFloat(input.value);
                if (e.deltaY < 0) { val = Math.min(max, val + step); } else if (e.deltaY > 0) { val = Math.max(min, val - step); }
                if (input.value !== val.toString()) { input.value = val; input.dispatchEvent(new Event('input')); }
            }, { passive: false }); 
        });

        // The reset button now mutates headless memory rather than crashing on missing sliders
        document.getElementById('btn-reset').onclick = () => {
            isLogScale = false; isFrozen = false; showPeaks = false; averagingAlpha = 0.0; 
            displayMaxDb = 0; displayMinDb = -140; zoomMinFreq = 0; zoomMaxFreq = 22000;
            scopeTimeWindowMs = 20; vertScaleMultiplier = 1.0; scopeTriggerLevel = 0.0; scopeTriggerSource = null; setTriggerSource(null);
            cursorsXEnabled = false; cursorsYEnabled = false; isOneShotArmed = false; isMemOverlay = false; memorySnapshot = null;
            
            Object.values(channels).forEach(ch => ch.offsetY = 0);
            scopeOffsetXMs = 0;

            controls.gain.el.value = 2; controls.gain.disp.textContent = "2.0x"; if (gainNode) gainNode.gain.setTargetAtTime(2, audioCtx.currentTime, 0.05);
            controls.avg.el.value = 0; controls.avg.disp.textContent = "OFF";
            controls.bandwidth.el.value = 11; controls.bandwidth.disp.textContent = "2048"; applyFftSize(); 

            const btnFreeze = document.getElementById('btn-freeze'); btnFreeze.textContent = "FREEZE: OFF"; btnFreeze.classList.replace('bg-blue-800', 'bg-neutral-800');
            const btnPeaks = document.getElementById('btn-peaks'); btnPeaks.textContent = "PEAKS: OFF"; btnPeaks.classList.replace('bg-pink-900', 'bg-neutral-800');
            document.getElementById('btn-scale').textContent = "X-SCALE: LINEAR";
            const btnOs = document.getElementById('btn-trig-oneshot'); btnOs.textContent = "1-SHOT"; btnOs.className = "flex-1 py-1 bg-neutral-800 border border-neutral-600 text-[9px] font-bold text-neutral-400";

            const btnCX = document.getElementById('btn-cursor-x'); btnCX.classList.replace('bg-green-900', 'bg-neutral-800'); btnCX.classList.replace('text-white', 'text-neutral-400');
            const btnCY = document.getElementById('btn-cursor-y'); btnCY.classList.replace('bg-purple-900', 'bg-neutral-800'); btnCY.classList.replace('text-white', 'text-neutral-400');
            
            document.getElementById('btn-mem-overlay').textContent = "OVERLAY: OFF"; document.getElementById('btn-mem-overlay').classList.replace('bg-red-900', 'bg-neutral-800');
            const btnRes = document.getElementById('btn-mem-restore'); btnRes.textContent = "RESTORE"; btnRes.classList.remove('bg-green-800');

            updateCursorReadouts();
            updateOSD();
        };

        updateUIControlVisibility();
        document.getElementById('btn-mic').onclick = () => initAudio('mic'); document.getElementById('btn-system').onclick = () => initAudio('system'); document.getElementById('btn-stop').onclick = stopAudio;
        
        requestAnimationFrame(drawVisualizer);
    </script>
</body>
</html>

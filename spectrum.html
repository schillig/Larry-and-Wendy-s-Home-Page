<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Professional Web-Based Audio Spectrum Analyzer and Oscilloscope">
    <title>Audio Spectrum Visualizer - REV 1.18.0</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎛️</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html { height: 100%; margin: 0; background-color: #0f172a; color: #f8fafc; }
        .canvas-container { box-shadow: 0 0 40px rgba(56, 189, 248, 0.1); resize: vertical; }
        input[type=range] { -webkit-appearance: none; background: transparent; padding: 8px 0; cursor: pointer; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 14px; width: 14px; border-radius: 50%; background: #22d3ee; margin-top: -4px; box-shadow: 0 0 5px rgba(34, 211, 238, 0.3); transition: transform 0.1s, box-shadow 0.2s; }
        input[type=range]:hover::-webkit-slider-thumb { transform: scale(1.2); box-shadow: 0 0 10px rgba(34, 211, 238, 0.8); }
        .group:hover input[type=range]::-webkit-slider-thumb { box-shadow: 0 0 12px rgba(34, 211, 238, 0.6); }
        input[type=range]::-webkit-slider-runnable-track { height: 6px; background: #334155; border-radius: 3px; }
    </style>
</head>
<body class="flex flex-col items-center p-3 md:p-4 font-sans overflow-x-hidden relative">

    <div id="toast-container" class="fixed top-5 left-1/2 transform -translate-x-1/2 z-50 flex flex-col items-center w-full px-4 pointer-events-none">
        <div id="message-box" class="transition-all duration-300 opacity-0 transform -translate-y-4 p-4 rounded-lg shadow-2xl text-sm max-w-xl text-center w-full"></div>
    </div>

    <!-- App-Bar Header -->
    <header class="w-full max-w-7xl flex flex-col md:flex-row justify-between items-center bg-slate-800/40 p-3 md:px-5 rounded-xl border border-slate-700/50 mb-4 shadow-md gap-3 md:gap-0">
        <div class="flex flex-col sm:flex-row items-center sm:gap-4 text-center sm:text-left">
            <h1 class="text-2xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-purple-500 whitespace-nowrap">
                Spectrum Analyzer <span class="text-slate-500 text-[10px] font-mono tracking-widest uppercase ml-1 align-top">Rev 1.18.0</span>
            </h1>
            <div class="text-slate-400 text-xs sm:border-l sm:border-slate-600 sm:pl-4 mt-1 sm:mt-0">
                Status: <span id="engine-status" class="text-yellow-500 font-mono">READY</span>
            </div>
        </div>
        <div class="flex gap-2">
            <button id="btn-mic" class="px-4 py-1.5 rounded-lg bg-slate-800 hover:bg-slate-700 border border-slate-600 transition-colors flex items-center justify-center gap-2 text-sm font-medium shadow-lg">Mic</button>
            <button id="btn-system" class="px-4 py-1.5 rounded-lg bg-slate-800 hover:bg-slate-700 border border-slate-600 transition-colors flex items-center justify-center gap-2 text-sm font-medium shadow-lg">System</button>
            <button id="btn-stop" class="hidden px-4 py-1.5 rounded-lg bg-red-900/50 hover:bg-red-800/80 border border-red-700 text-red-200 transition-colors text-sm font-medium shadow-lg">Stop</button>
        </div>
    </header>

    <div class="w-full max-w-7xl flex justify-between items-end mb-2 px-2">
        <h2 class="text-slate-400 font-bold text-xs tracking-widest uppercase">Control Panel</h2>
        <button id="btn-reset" class="text-xs text-cyan-500 hover:text-cyan-300 transition-colors flex items-center gap-1">Restore Defaults</button>
    </div>

    <!-- Instrument Control Panel -->
    <div class="bg-slate-800/50 p-4 md:p-5 rounded-2xl border border-slate-700/50 grid grid-cols-1 md:grid-cols-2 xl:grid-cols-6 gap-x-8 gap-y-6 mb-6 w-full max-w-7xl shadow-xl">
        <!-- (Keeping control panel layout consistent with Rev 1.15.0 for stability) -->
        <!-- ... [Controls code omitted for brevity; see Rev 1.15.0 block] ... -->
    </div>

    <script>
        // ... [Initializations and core loop same as 1.15.0] ...

        /**
         * REV 1.18.0: Updated Labeling Logic
         * Dynamically swaps labels based on mode to support Y-axis Time (Waterfall)
         */
        function updateCursorReadouts() {
            const isWaterfall = viewMode === 'waterfall';
            const isScope = viewMode === 'oscilloscope';
            const isLissajous = viewMode === 'lissajous';

            if (isScope || isLissajous) {
                document.getElementById('lbl-f1').textContent = 'T1:';
                document.getElementById('lbl-f2').textContent = 'T2:';
                document.getElementById('lbl-df').textContent = 'ΔT:';
                document.getElementById('lbl-a1').textContent = 'V1:';
                document.getElementById('lbl-a2').textContent = 'V2:';
                document.getElementById('lbl-da').textContent = 'ΔV:';
            } else if (isWaterfall) {
                document.getElementById('lbl-f1').textContent = 'F1:';
                document.getElementById('lbl-f2').textContent = 'F2:';
                document.getElementById('lbl-df').textContent = 'ΔF:';
                // Waterfall Y-axis is time history
                document.getElementById('lbl-a1').textContent = 'T1:';
                document.getElementById('lbl-a2').textContent = 'T2:';
                document.getElementById('lbl-da').textContent = 'ΔT:';
            } else {
                document.getElementById('lbl-f1').textContent = 'F1:';
                document.getElementById('lbl-f2').textContent = 'F2:';
                document.getElementById('lbl-df').textContent = 'ΔF:';
                document.getElementById('lbl-a1').textContent = 'A1:';
                document.getElementById('lbl-a2').textContent = 'A2:';
                document.getElementById('lbl-da').textContent = 'ΔA:';
            }
            // ... (Logic to calculate and display values based on above labels)
        }

        // REV 1.18.0: Logic update to allow Y-Dragging in Waterfall mode
        function handlePointerMove(e) {
            // ... (Dragging code)
            if (activeDrag.id === 'y1' && (viewMode !== 'oscilloscope' && viewMode !== 'lissajous')) {
                 // In Waterfall mode, Y-cursor measures time history index
                 cursorY1Db = getDbFromY(y, activeDrag.cvs.height); 
            }
            // ...
        }

        // ... [Remaining initialization code]
    </script>
</body>
</html>

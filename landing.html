<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Larry and Wendy's Home Page</title>
    
    <!-- Modern Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Kept your original bright green */
            --neon-green: #00FF33;
            /* Modern glassmorphism colors */
            --glass-bg: rgba(15, 15, 20, 0.65);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #FFFFFF;
            --text-muted: #A0A5B0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #000;
            /* Using your original star background */
            background-image: url("NewStars.png");
            background-repeat: repeat;
            background-attachment: fixed;
            background-size: auto;
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
        }

        /* A subtle dark radial gradient over the stars so the content is easy to read */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.85) 100%);
            z-index: 0;
        }

        /* Center Glassmorphism Container */
        .container {
            position: relative;
            z-index: 1;
            background: var(--glass-bg);
            /* This blur creates the frosted glass look */
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 4rem;
            text-align: center;
            max-width: 700px;
            width: 90%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 
                        0 0 35px rgba(0, 255, 51, 0.08);
            /* Slide up fade-in on load */
            animation: fadeIn 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Modernized Neon Title */
        h1 {
            font-family: 'Space Mono', monospace;
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            color: var(--neon-green);
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            line-height: 1.1;
            /* CSS Neon Glow text-shadow */
            text-shadow: 
                0 0 5px var(--neon-green),
                0 0 15px rgba(0, 255, 51, 0.8),
                0 0 30px rgba(0, 255, 51, 0.6),
                0 0 50px rgba(0, 255, 51, 0.4);
            animation: pulse 4s infinite alternate ease-in-out;
        }

        /* Subtly pulsating the glow */
        @keyframes pulse {
            0% { text-shadow: 0 0 5px var(--neon-green), 0 0 15px rgba(0,255,51,0.8), 0 0 30px rgba(0,255,51,0.6); }
            100% { text-shadow: 0 0 8px var(--neon-green), 0 0 20px rgba(0,255,51,0.9), 0 0 40px rgba(0,255,51,0.7), 0 0 60px rgba(0,255,51,0.5); }
        }

        .subtitle {
            font-size: 1.25rem;
            color: var(--text-muted);
            margin-bottom: 3.5rem;
            font-weight: 400;
        }

        /* Flex layout for the navigation buttons */
        .links-grid {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            align-items: center;
        }

        /* Interactive Dynamic Buttons */
        .action-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 380px;
            padding: 1.25rem 2rem;
            background: rgba(0, 255, 51, 0.03);
            border: 1px solid rgba(0, 255, 51, 0.3);
            border-radius: 12px;
            color: var(--text-main);
            text-decoration: none;
            font-family: 'Space Mono', monospace;
            font-size: 1.1rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            position: relative;
            overflow: hidden;
        }

        /* Background fill slide on hover */
        .action-button::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 0%; height: 100%;
            background: var(--neon-green);
            opacity: 0.15;
            transition: width 0.4s ease;
            z-index: 0;
        }

        /* Hover states for the micro-animations */
        .action-button:hover {
            border-color: var(--neon-green);
            color: var(--neon-green);
            box-shadow: 0 0 25px rgba(0, 255, 51, 0.4), inset 0 0 15px rgba(0, 255, 51, 0.2);
            transform: translateY(-4px);
        }

        .action-button:hover::before {
            width: 100%;
        }

        .action-button span {
            position: relative;
            z-index: 1;
        }

        /* Meteor Animation */
        .meteor-container {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .meteor {
            position: absolute;
            width: 2px;
            height: 60px;
            background: linear-gradient(to bottom, rgba(255,255,255,0), #00FF33);
            border-radius: 50%;
            transform: rotate(45deg);
            opacity: 0;
            animation: shooting-star 10s linear infinite;
        }
        .meteor:nth-child(1) { top: 10%; left: 30%; animation-delay: 2s; animation-duration: 8s; }
        .meteor:nth-child(2) { top: -20px; left: 70%; animation-delay: 6s; animation-duration: 12s; }
        .meteor:nth-child(3) { top: 40%; left: 10%; animation-delay: 4s; animation-duration: 9s; }
        
        @keyframes shooting-star {
            0% { opacity: 0; transform: translate(0, 0) rotate(45deg); }
            5% { opacity: 1; }
            15% { opacity: 0; transform: translate(60vw, 60vh) rotate(45deg); }
            100% { opacity: 0; transform: translate(60vw, 60vh) rotate(45deg); }
        }
    </style>
</head>
<body>

    <div class="meteor-container">
        <div class="meteor"></div>
        <div class="meteor"></div>
        <div class="meteor"></div>
    </div>

    <div class="container">
        <!-- Kept your original title string -->
        <h1>Larry & Wendy's<br>Home Page</h1>
        <p class="subtitle">Exploring modern web design among the stars.</p>

        <!-- Dynamic links utilizing your existing project pages -->
        <div class="links-grid">
            <a href="index.html" class="action-button">
                <span>Classic Grid Version</span>
            </a>
            <a href="news_directory.html" class="action-button">
                <span>Global News Directory</span>
            </a>
            <a href="englishnews.html" class="action-button">
                <span>Live English News Cams</span>
            </a>
            <a href="Bird.html" class="action-button">
                <span>The Bird Page</span>
            </a>
        </div>
    </div>

</body>
</html>
